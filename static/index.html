<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#101722" />
  <!-- installata da "Aggiungi a schermata Home" parte senza barra del browser -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <title>SPQRisiKo</title>
  <style>
    :root {
      --bg: #101722;
      --panel: #1a2434;
      --panel2: #223049;
      --line: #33445f;
      --text: #e8edf5;
      --muted: #93a3ba;
      --accent: #d9a53f;
      --sea: #16283e;
      --free: #3a4a5e;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      margin: 0; font-family: system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      /* 100vh sugli smartphone assume la viewport "piena" (barra del browser
         nascosta): se la barra e' visibile il contenuto sborda e appare uno
         scroll che la rivela di nuovo. 100dvh segue l'altezza visibile reale;
         il fallback 100vh resta per i browser che non la supportano. */
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
    }
    header {
      display: flex; align-items: center; gap: 14px;
      padding: 8px 14px; background: var(--panel); border-bottom: 1px solid var(--line);
      flex: 0 0 auto;
    }
    header h1 { font-size: 18px; margin: 0; color: var(--accent); letter-spacing: 1px; }
    .chip {
      background: var(--panel2); border: 1px solid var(--line); border-radius: 20px;
      padding: 3px 12px; font-size: 13px; white-space: nowrap;
    }
    .chip b { color: var(--accent); }
    #connDot { width: 10px; height: 10px; border-radius: 50%; background: #c0392b; }
    #connDot.on { background: #2ecc71; }
    header .spacer { flex: 1; }
    header button { font-size: 12px; padding: 4px 10px; }

    /* schermata di ingresso */
    #joinScreen {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    #joinBox {
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
      padding: 28px; width: 340px; display: flex; flex-direction: column; gap: 10px;
    }
    #joinBox h2 { margin: 0 0 6px; color: var(--accent); }
    input, select {
      font-size: 15px; padding: 9px 10px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--panel2); color: var(--text);
    }
    button {
      font-size: 14px; padding: 9px 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--line); background: var(--panel2); color: var(--text);
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #1c1607; font-weight: 600; border: none; }
    button.danger { border-color: #a33; color: #f2b3b3; }
    button:disabled { opacity: .45; cursor: default; }

    /* layout partita */
    #gameScreen { flex: 1; display: none; min-height: 0; }
    #gameScreen.on { display: flex; }
    #mapWrap { flex: 1; min-width: 0; padding: 6px; }
    #map { width: 100%; height: 100%; display: block; }
    aside {
      width: 340px; flex: 0 0 340px; background: var(--panel);
      border-left: 1px solid var(--line); display: flex; flex-direction: column;
      overflow-y: auto;
    }
    aside section { padding: 10px 12px; border-bottom: 1px solid var(--line); }
    aside h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

    .pRow { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 14px; }
    .pRow .dot { width: 12px; height: 12px; border-radius: 3px; flex: 0 0 12px; }
    .pRow.turn { background: rgba(217,165,63,.12); border-radius: 6px; }
    .pRow .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pRow .inf { color: var(--muted); font-size: 12px; }

    #actions .hint { font-size: 13px; color: var(--muted); margin: 4px 0 8px; }
    #actions .row { display: flex; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
    #actions .row > button { flex: 1; }
    #actions .selInfo {
      background: var(--panel2); border-radius: 8px; padding: 6px 10px;
      font-size: 13px; margin: 4px 0;
    }
    #actions input, #actions select { font-size: 13px; padding: 6px 8px; }
    #actions label { font-size: 12px; color: var(--muted); }

    .cardChip {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--panel2); border: 1px solid var(--line); border-radius: 8px;
      padding: 5px 9px; margin: 2px; font-size: 13px; cursor: pointer; user-select: none;
    }
    .cardChip.sel { border-color: var(--accent); background: rgba(217,165,63,.18); }

    .die {
      display: inline-block; font-size: 26px; line-height: 1; margin-right: 2px;
    }
    .combatRow { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 13px; }
    .combatRow .vs { color: var(--muted); font-size: 11px; }
    .combatHead { font-size: 13px; margin-bottom: 4px; }
    .combatHead .win { color: var(--accent); font-weight: 700; }
    #combatRolls { max-height: 130px; overflow-y: auto; }
    #logBox {
      font-family: ui-monospace, Consolas, monospace; font-size: 11.5px;
      color: var(--muted); max-height: 200px; overflow-y: auto; white-space: pre-wrap;
    }
    #logBox .me { color: var(--text); }

    #toast {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      background: #7a2c2c; color: #ffe3e3; border-radius: 10px; padding: 10px 18px;
      font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 50;
      max-width: 70vw;
    }
    #toast.on { opacity: 1; }
    #a2hsHint {
      position: fixed; left: 50%; bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%); display: none; align-items: center; gap: 10px;
      background: #1c2636; border: 1px solid var(--accent); color: var(--text);
      border-radius: 10px; padding: 10px 12px; font-size: 13px; z-index: 60;
      max-width: min(92vw, 420px); box-shadow: 0 4px 18px rgba(0,0,0,.4);
    }
    #a2hsHint.on { display: flex; }
    #a2hsHint b { color: var(--accent); }
    #a2hsHintClose {
      flex: none; background: none; border: none; color: var(--muted);
      font-size: 16px; line-height: 1; cursor: pointer; padding: 2px 4px;
    }
    #banner {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(10,14,20,.82); z-index: 40; flex-direction: column; gap: 16px;
    }
    #banner.on { display: flex; }
    #banner .big { font-size: 42px; color: var(--accent); font-weight: 700; }

    /* SVG: pedine tonde (colore proprietario + legioni) sopra la plancia reale,
       stile RISK II */
    .prov circle {
      stroke: #0b111a; stroke-width: 1.4; cursor: pointer;
      fill-opacity: .95; transition: stroke .12s;
      filter: drop-shadow(0 1px 1.5px rgba(0,0,0,.55));
    }
    .prov text { pointer-events: none; }
    .prov .lg {
      font-size: 15px; font-weight: 700; fill: #fff;
      stroke: #0b111a; stroke-width: .6px; paint-order: stroke;
    }
    /* bersagli legali: contorno pulsante per farli "chiamare" il tocco.
       colore diverso per un proprio bersaglio (selezionabile/amico) rispetto
       a un bersaglio nemico (attacco) */
    @keyframes clickPulse {
      0%, 100% { stroke-opacity: .5; }
      50% { stroke-opacity: 1; }
    }
    .prov.clickable circle {
      stroke: var(--accent); stroke-width: 2.4;
      animation: clickPulse 1.3s ease-in-out infinite;
    }
    .prov.clickable.atkTarget circle {
      stroke: #ff5f5f;
      animation: clickPulse 1.1s ease-in-out infinite;
    }
    .prov.clickable:hover circle { stroke: #fff; stroke-width: 2.8; animation: none; }
    .prov.selA circle { stroke: var(--accent); stroke-width: 3; animation: none; }
    .prov.selB circle { stroke: #7fd4ff; stroke-width: 3; animation: none; }
    .prov.deficit circle { stroke: #ff5252; stroke-width: 3; stroke-dasharray: 5 3; }
    .prov.neutralOwner circle { stroke-dasharray: 4 2; }
    /* i mari sono gia' disegnati sulla plancia: il rettangolo e' l'area
       cliccabile e la "rastrelliera" che tiene i gettoni-nave dei giocatori */
    .sea .seaBox {
      fill: rgba(8,20,36,.42); stroke: rgba(159,197,239,.35); stroke-width: 1.2;
      cursor: pointer;
    }
    .sea text { pointer-events: none; }
    .sea .slot { pointer-events: none; stroke: #0b111a; stroke-width: 1; }
    .sea .slotN {
      font-size: 13px; font-weight: 700; fill: #fff;
      stroke: #0b111a; stroke-width: .7px; paint-order: stroke;
      pointer-events: none;
    }
    /* mare senza navi: nessuna cornice visibile, resta solo l'area di tocco
       (le regole di stato qui sotto la rendono comunque visibile quando serve) */
    .sea.empty .seaBox { fill: rgba(80,140,210,.02); stroke: none; }
    .sea.clickable .seaBox {
      stroke: #9fc5ef; stroke-width: 2.2;
      animation: clickPulse 1.3s ease-in-out infinite;
    }
    .sea.clickable.atkTarget .seaBox {
      stroke: #ff5f5f;
      animation: clickPulse 1.1s ease-in-out infinite;
    }
    .sea.clickable:hover .seaBox { stroke: #fff; animation: none; }
    .sea.selA .seaBox { stroke: var(--accent); stroke-width: 3; animation: none; }
    .sea.selB .seaBox { stroke: #7fd4ff; stroke-width: 3; animation: none; }
    .edge { stroke: #2c3c55; stroke-width: 1.1; }
    /* disco dorato dietro il colosseo: e' lui a far risaltare l'icona sulla
       plancia (staccato dal cerchio della provincia) */
    /* .prov circle ha regole proprie (bordo scuro, ombra): serve piu' peso */
    .prov circle.pcHalo {
      fill: #14243a; stroke: var(--accent); stroke-width: 2;
      filter: drop-shadow(0 0 3px rgba(217,165,63,.85));
      pointer-events: none;
    }
    .pcHalo.off, .pcIcon.off { display: none; }
    .pcIcon { font-size: 14px; pointer-events: none; }
    /* area di tocco allargata: deve restare invisibile anche quando la
       provincia e' selezionata o pulsa come bersaglio, quindi va dopo tutte
       le regole .prov (stessa specificita': vince l'ultima) */
    .prov circle.hit {
      fill: transparent; stroke: none; filter: none; animation: none;
    }

    /* freccia d'attacco: il collegamento attaccante→difensore disegnato sulla
       plancia, come in RISK II */
    /* il layer della freccia sta sopra le province: se intercettasse i tocchi
       si mangerebbe il tap sul bersaglio (il cuneo copre proprio la fascia fra
       i due gettoni). Nessun elemento qui dentro e' cliccabile. */
    #atkLayer { pointer-events: none; }
    .atkWedge {
      stroke: #0b111a; stroke-width: 1.5; stroke-linejoin: round;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.75));
    }
    /* mira non ancora confermata: il cuneo pulsa invece di stare fermo */
    .atkWedge.pending { animation: atkPulse .9s ease-in-out infinite; }
    /* rotte alternative ancora da scegliere: in campo ma spente, cosi' la
       rotta decisa (che pulsa) si distingue a colpo d'occhio */
    .atkWedge.alt { opacity: .4; }
    @keyframes atkPulse { 50% { opacity: .55; } }
    .atkFx { pointer-events: none; }
    .atkFx rect { fill: rgba(11,17,26,.88); stroke: var(--accent); stroke-width: 1.5; }
    .atkFx text { font-size: 17px; fill: #fff; }
    .atkFx .atkWin {
      font-size: 15px; font-weight: 700; fill: var(--accent);
      stroke: #0b111a; stroke-width: 3px; paint-order: stroke;
    }

    /* pan & zoom mappa */
    #map { touch-action: none; }
    #mapWrap { position: relative; }
    #mapCtl {
      position: absolute; right: 10px; bottom: 10px; display: flex; flex-direction: column; gap: 6px;
      z-index: 5;
    }
    #mapCtl button {
      width: 40px; height: 40px; padding: 0; font-size: 20px; border-radius: 10px;
      background: rgba(26,36,52,.9);
    }

    /* indicatore di fase/turno minimale sovrapposto alla mappa: l'occhio non
       deve staccarsi dalla mappa per sapere "che fase è" o di chi è il turno */
    #mapHud {
      position: absolute; left: 8px; top: 8px; z-index: 5; pointer-events: none;
      display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
      max-width: 62%;
    }
    #mapHud .chip {
      background: rgba(16,23,34,.82); border-color: var(--line);
      backdrop-filter: blur(2px);
    }
    #mapHud .turnLine { display: flex; align-items: center; gap: 6px; }
    #mapHud .turnLine .dot { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 10px; }
    #mapHud .turnLine.mine .chip { border-color: var(--accent); color: var(--accent); font-weight: 700; }

    /* slider e bottoni segmentati (touch-friendly) */
    .sliderRow { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .sliderRow label { flex: 0 0 auto; }
    .sliderRow input[type=range] { flex: 1; min-width: 0; accent-color: var(--accent); height: 28px; }
    .sliderRow .sv { flex: 0 0 auto; min-width: 52px; text-align: center; font-size: 14px; font-weight: 700; color: var(--accent); }
    .segBtns { display: flex; gap: 6px; flex: 1; }
    .segBtns button { flex: 1; }
    .segBtns button.on { background: var(--accent); color: #1c1607; font-weight: 700; border: none; }
    .counters { display: flex; gap: 6px; flex-wrap: wrap; margin: 2px 0 8px; }
    .counters .chip { font-size: 12px; padding: 4px 10px; }
    .seaChip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--panel2); border: 1px solid var(--accent); border-radius: 8px;
      padding: 5px 9px; margin: 2px; font-size: 13px; cursor: pointer;
    }

    /* bottoni flottanti (solo telefono) */
    .fab {
      width: 50px; height: 50px; border-radius: 50%; padding: 0; font-size: 22px;
      background: rgba(26,36,52,.92); border: 1px solid var(--line);
      box-shadow: 0 3px 12px rgba(0,0,0,.45);
    }
    #fabL { position: fixed; left: 10px; bottom: calc(12px + env(safe-area-inset-bottom)); display: none; gap: 10px; z-index: 50; }
    #fabFs { position: fixed; right: 10px; bottom: calc(12px + env(safe-area-inset-bottom)); display: none; z-index: 50; }
    #actionsTab { display: none; }

    /* badge punti vittoria correnti nel pannello giocatori */
    .vpBadges { font-size: 11px; color: var(--accent); margin: 0 0 4px 20px; }

    /* popup esito combattimento (telefono) */
    #combatPop {
      position: fixed; left: 50%; top: 16%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--accent); border-radius: 14px;
      padding: 12px 16px; z-index: 60; box-shadow: 0 8px 30px rgba(0,0,0,.6);
      max-width: 92vw; display: none;
    }
    #combatPop.on { display: block; }

    /* ===== arena dei dadi: il tiro d'attacco si guarda qui, non nel pannello.
       Attaccante a sinistra, difensore a destra, come sul tavolo vero. ===== */
    #duelWrap {
      position: fixed; inset: 0; z-index: 70; display: none;
      align-items: center; justify-content: center;
      background: rgba(6,10,16,.72); backdrop-filter: blur(2px);
    }
    #duelWrap.on { display: flex; }
    #duelBox {
      background: var(--panel); border: 1px solid var(--accent); border-radius: 16px;
      padding: 14px 18px 16px; box-shadow: 0 14px 44px rgba(0,0,0,.7);
      max-width: min(92vw, 460px); width: 100%; text-align: center;
    }
    .duelTitle { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .duelSub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    /* i dadi si affrontano riga per riga: attaccante | cuneo | difensore,
       dal piu' alto al piu' basso, come si allineano sul tavolo */
    .duelArena { display: flex; flex-direction: column; gap: 2px; }
    .duelRow {
      display: grid; grid-template-columns: 1fr 44px 1fr;
      align-items: center; justify-items: center;
    }
    .duelHead { margin-bottom: 2px; }
    .duelWho { font-size: 12px; font-weight: 700; }
    .duelVs { font-size: 18px; opacity: .8; }
    .duelGap { width: 100%; }
    .dieVuoto { font-size: 24px; color: var(--muted); opacity: .45; }
    .duelCuneo { filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
    .duelForze { margin-top: 8px; align-items: start; }
    /* contatore perdite dello scontro, sotto le rispettive schiere */
    .duelCount {
      margin-top: 6px; font-size: 12px; font-weight: 700;
      border-top: 1px solid rgba(255,255,255,.08); padding-top: 6px;
    }
    .dieBig {
      font-size: 46px; line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,.6);
      transition: transform .12s;
    }
    /* mentre gira: il dado sobbalza, cosi' si vede che non e' ancora fermo */
    .dieBig.rolling { animation: dieRoll .16s linear infinite; }
    @keyframes dieRoll {
      0% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-5px) rotate(8deg); }
      100% { transform: translateY(0) rotate(-8deg); }
    }
    /* esito del singolo confronto: il dado che perde si spegne */
    .dieBig.lost { opacity: .35; transform: scale(.86); }
    .dieBig.won { transform: scale(1.12); }
    /* le statuine schierate sotto i dadi: danno la misura della forza in campo */
    .duelForza {
      display: flex; flex-wrap: wrap; gap: 2px; justify-content: center;
      align-items: flex-end; min-height: 22px;
    }
    .statuina { filter: drop-shadow(0 1px 1px rgba(0,0,0,.6)); }
    /* pezzo caduto in questo tiro: resta in campo, spento e barrato */
    .statuina.fallen { opacity: .3; transform: rotate(78deg) translateY(2px); }
    .sigillo text {
      font-size: 9px; font-weight: 700; fill: #fff;
      stroke: #0b111a; stroke-width: .7px; paint-order: stroke;
    }
    .sigillo { filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
    .sigillo.rotto circle { opacity: .45; }
    .forzaTot {
      width: 100%; font-size: 11px; color: var(--muted); margin-top: 2px;
    }
    .forzaVuota { color: var(--muted); font-size: 13px; }

    .duelLoss { font-size: 13px; margin-top: 10px; min-height: 20px; font-weight: 700; }
    .duelLoss .lossA { color: #ff8a8a; }
    .duelLoss .lossD { color: #8affa0; }
    .duelWin { color: var(--accent); font-weight: 700; font-size: 15px; }
    /* bilancio della battaglia nella vista di conquista */
    .duelStats {
      display: grid; grid-template-columns: 1fr 44px 1fr; align-items: start;
      margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.08);
    }
    .statCol { text-align: center; }
    .statWho { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .statRiga { font-size: 12px; color: var(--muted); }
    .statNum { font-size: 15px; font-weight: 700; color: #e8eef7; }
    .statNum.statPerse { color: #ff8a8a; }
    .statResto { margin-top: 2px; }
    /* quante legioni restano e quante avanzano nella provincia presa */
    .duelSplit { margin-top: 8px; align-items: start; }
    .duelQta {
      font-size: 22px; font-weight: 700; min-width: 42px; display: inline-block;
      color: var(--accent);
    }
    .duelRange { width: 100%; margin-top: 8px; accent-color: var(--accent); }
    /* scelta di quanti dadi tirare */
    .duelPick { display: flex; gap: 6px; justify-content: center; align-items: center; margin-top: 12px; }
    .duelPick .lbl { font-size: 12px; color: var(--muted); margin-right: 2px; }
    .duelPick button { padding: 8px 14px; font-weight: 700; }
    .duelPick button.sel { border-color: var(--accent); color: var(--accent); }
    .duelBtns { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .duelBtns button { flex: 1; padding: 12px; font-size: 15px; }
    /* la ritirata non e' un'azione da premere per sbaglio: sta li' spenta */
    .duelBtns button.ritira { color: #ffb4b4; border-color: rgba(255,120,120,.45); }
    .duelBtns button.ritira:hover { border-color: #ff8a8a; }
    .duelWarn { font-size: 12px; color: #ff8a8a; margin-top: 10px; }
    /* §12.3: l'avviso che l'attacco via mare non si puo' abbandonare. Va letto
       PRIMA di salpare, non e' una nota a pie' di pagina */
    .sbarcoWarn {
      border: 1px solid rgba(255,120,120,.35); border-radius: 8px;
      padding: 8px 10px; line-height: 1.35; background: rgba(255,120,120,.07);
    }
    .duelBtns button.salpa { color: var(--accent); border-color: var(--accent); font-weight: 700; }
    .duelLose { color: #ff8a8a; font-weight: 700; font-size: 15px; }

    /* menu contestuale su pressione prolungata di una provincia/mare */
    #tileMenu {
      position: fixed; z-index: 55; display: none; flex-direction: column; gap: 4px;
      background: var(--panel); border: 1px solid var(--accent); border-radius: 10px;
      padding: 6px; box-shadow: 0 8px 26px rgba(0,0,0,.6); max-width: 80vw;
    }
    #tileMenu.on { display: flex; }
    #tileMenu button { white-space: nowrap; text-align: left; }

    /* layout telefono: mappa a tutto schermo, pannelli a comparsa
       (vale anche per telefoni orizzontali larghi: schermo basso = telefono) */
    @media (max-width: 820px), (max-height: 500px) {
      header { flex-wrap: wrap; gap: 6px; padding: 6px 8px; }
      header h1 { font-size: 15px; }
      .chip { font-size: 12px; padding: 2px 9px; }
      button { padding: 12px 12px; font-size: 15px; }

      #gameScreen.on { flex-direction: column; position: relative; }
      #mapWrap { flex: 1; min-height: 0; padding: 2px; }
      /* in alto a destra: il foglio azioni in basso li coprirebbe */
      #mapCtl { top: 8px; right: 8px; bottom: auto; }
      #mapCtl button { width: 44px; height: 44px; }
      #gameScreen.on ~ #fabL { display: flex; }
      #gameScreen.on ~ #fabFs { display: block; }

      /* il pannello laterale sparisce: le sue sezioni diventano overlay */
      aside { display: contents; }
      aside section { background: var(--panel); }

      /* azioni: overlay a comparsa come carte/giocatori, niente più lembo
         visibile quando è chiuso: o c'è o non c'è */
      #secActions, #secCards, #secPlayers, #secCombat, #secLog { display: none; }
      #secActions.open {
        display: block; position: fixed; left: 0; right: 0; bottom: 0; z-index: 47;
        border-top: 1px solid var(--line); border-radius: 16px 16px 0 0;
        max-height: 50vh; overflow-y: auto;
        padding: 4px 14px calc(74px + env(safe-area-inset-bottom));
        box-shadow: 0 -8px 28px rgba(0,0,0,.55);
      }

      #actionsTab {
        display: block; position: fixed; left: 50%; transform: translateX(-50%);
        bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 48;
        transition: bottom .2s ease;
        padding: 9px 18px; border-radius: 20px; font-size: 14px;
        background: rgba(26,36,52,.94); box-shadow: 0 3px 14px rgba(0,0,0,.45);
      }
      /* col foglio azioni aperto la tab sale sopra il suo bordo superiore:
         resta sempre raggiungibile per richiuderlo */
      #actionsTab.raised { bottom: calc(50vh + 8px); }

      /* carte e giocatori: pannelli a comparsa dai bottoni in basso a sinistra */
      #secCards.open, #secPlayers.open {
        display: block; position: fixed; left: 8px; right: 8px;
        bottom: calc(74px + env(safe-area-inset-bottom)); z-index: 45;
        border: 1px solid var(--line); border-radius: 14px;
        max-height: 62vh; overflow-y: auto;
        box-shadow: 0 8px 30px rgba(0,0,0,.6);
      }
    }

    /* telefono orizzontale (fullscreen): azioni come cassetto a destra,
       la mappa tiene tutta la larghezza */
    @media (max-height: 500px) {
      #secActions.open {
        left: auto; right: 0; width: min(390px, 48vw);
        max-height: 100vh; border-radius: 14px 0 0 0;
        border-left: 1px solid var(--line);
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
      #secCards.open, #secPlayers.open {
        left: 8px; right: auto; width: min(430px, 55vw);
        bottom: calc(74px + env(safe-area-inset-bottom));
        max-height: 80vh;
      }
      /* zoom in alto a sinistra: a destra c'è il cassetto azioni */
      #mapCtl { top: 8px; right: auto; left: 8px; flex-direction: row; }
      /* l'hud di fase/turno scende sotto la riga di zoom, che qui è a sinistra */
      #mapHud { top: 56px; max-width: 50%; }
      /* fullscreen accanto agli altri bottoni: il cassetto occupa l'angolo destro */
      #fabFs { right: auto; left: 140px; }
      #combatPop { top: 8%; }
      /* la tab azioni si sposta dopo carte/giocatori/fullscreen (a sinistra
         c'è il cassetto è sul lato destro, non la copre mai) */
      #actionsTab { left: 200px; transform: none; }
      #actionsTab.raised { bottom: calc(10px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>SPQRisiKo</h1>
    <div id="connDot"></div>
    <span class="chip" id="roomChip">—</span>
    <span class="chip" id="phaseChip">—</span>
    <span class="chip" id="turnChip">—</span>

        <button id="zoomIn" title="Zoom avanti">＋</button>

  <!-- tab fissa (telefono): mostra/nasconde il foglio azioni senza lasciarne
       un lembo visibile sopra la mappa quando è chiuso -->

  <!-- bottoni flottanti (telefono): carte, giocatori, fullscreen -->
  <div id="fabL">
    <button class="fab" id="fabCards" title="Le tue carte">🃏</button>
    <button class="fab" id="fabPlayers" title="Giocatori e punti">👥</button>
  </div>

  <div id="a2hsHint"><span>Per il vero schermo intero (niente barra/schede del browser): tocca <b>Condividi</b> ⬆️ → <b>"Aggiungi a Home"</b>.</span><button id="a2hsHintClose" title="Chiudi">✕</button></div>
  <div id="banner">
    <div class="big" id="bannerText"></div>

<script>
"use strict";
const CLIENT_VERSION = "index-v9-map-first";

/* ============ coordinate mappa (centri tile) ============ */
/* coordinate tarate sulla plancia reale (static/board.jpg), sul rettangolo
   1240x700 della mappa; sotto, fino a 919, c'e' il tracciato punteggi */
const PROV_XY = {
  BRITANNIA:[165,72], GERMANIA_INFERIOR:[275,43], BELGICA:[294,166],
  LUGDUNENSE:[304,232], RAETIA:[427,132], NORICUM:[531,121],
  PANNONIA:[710,132], DACIA:[668,43], MOESIA:[769,77],
  AQUITANIA:[213,269], NARBONENSIS:[287,297], CISALPINA:[430,227],
  ILLIRIA:[531,199], DALMAZIA:[631,181], THRACIA:[794,190],
  GALICIA:[119,414], TERRACONENSIS:[205,472], LUSITANIA:[62,459],
  BAETICA:[178,558], ITALIA:[474,295], CORSICA:[432,343],
  SARDINIA:[439,413], SICILIA:[572,449], BALEARES:[302,463],
  EPIRUS:[677,300], MACEDONIA:[724,253], ACHAIA:[749,351],
  CRETA:[833,413], ASIA:[853,225], BITHYNIA:[909,146],
  PONTO:[1084,67], GALATIA:[967,205], CAPPADOCIA:[1078,181],
  CILICIA:[984,261], CIPRO:[1012,306], SYRIA:[1134,329],
  JUDEA:[1144,456], ARABIA:[1220,454], ARMENIA:[1191,200],
  MESOPOTAMIA:[1178,294], MAURETANIA:[308,630], NUMIDIA:[401,600],
  AFRICA:[496,555], CYRENAICA:[833,642], AEGYPTUS:[1022,568],
};
const SEA_XY = {
  BRITANNICUS:[69,165], CANTABRICUM:[72,261], IBERICUM:[67,637],
  BALEARICUM:[350,511], SINUS_GALLICUS:[353,383], TYRRENUM:[521,394],
  HADRIATICUM:[576,271], IONIUM:[754,479], AEGEUM:[857,351],
  CRETICUM:[930,454], PONTUS_EUXINUS:[864,70], SYRTIS:[581,506],
};
const PIP_R = 15;
/* gettoni-nave: un quadrato per giocatore presente nel mare, dentro un
   rettangolo dimensionato per ospitarli tutti (quelli presenti sono centrati) */
const SEA_SQ = 15, SEA_GAP = 3, SEA_PAD = 5;
const seaBoxSize = n => ({
  w: n * SEA_SQ + (n - 1) * SEA_GAP + 2 * SEA_PAD,
  h: SEA_SQ + 2 * SEA_PAD,
});

const COLOR_HEX = {
  // BLACK deve restare distinguibile dal grigio delle province libere (--free)
  RED:"#c0483e", BLUE:"#3f6fbf", YELLOW:"#c29a2e", GREEN:"#3f9159", BLACK:"#1e1e26",
  GRAY:"#7d8590", // colore unico dei neutrali (regola casa)
};
const CARD_ICON = { LEGIONARIO:"🗡️", TRIREME:"⛵", VESSILLO:"🚩", ARENA:"🏛️" };

/* ============ stato client ============ */
let ws = null, myPlayerId = null, lastState = null, isSpectator = false;
let autoReconnect = false, reconnectTimer = null;
let mapBuilt = false;

/* selezioni / input dell'azione in corso; azzerate al cambio fase/turno */
const freshUi = key => ({ key, mode:null, sel:{}, placements:{}, tris:[], trisSeas:[], trisPc:null, vals:{} });
let ui = freshUi("");

const SESSION_KEY = "spq_session";
const loadSession = () => { try { return JSON.parse(localStorage.getItem(SESSION_KEY)||"null"); } catch { return null; } };
const saveSession = s => localStorage.setItem(SESSION_KEY, JSON.stringify(s));

const $ = id => document.getElementById(id);
const el = (tag, attrs={}, ...kids) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "onclick") e.onclick = v;
    else if (k === "oninput") e.oninput = v;
    else if (k === "style") e.style.cssText = v;
    else e.setAttribute(k, v);
  }
  for (const k of kids) e.append(k);
  return e;
};

function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.classList.add("on");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("on"), 4000);
}

/* ============ connessione ============ */
function genRoom() {
  const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s = "";
  for (let i=0;i<6;i++) s += c[Math.floor(Math.random()*c.length)];
  return s;
}

function connect(spectate = false) {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  const name = ($("name").value.trim() || "anon");
  const room = ($("room").value.trim().toUpperCase() || "LOBBY");
  const proto = location.protocol === "https:" ? "wss" : "ws";
  let url = `${proto}://${location.host}/ws/${encodeURIComponent(room)}/${encodeURIComponent(name)}`;
  if (spectate) {
    url += "?spectate=1";
  } else {
    const s = loadSession();
    if (s && s.room === room && s.playerId && s.token)
      url += `?playerId=${encodeURIComponent(s.playerId)}&token=${encodeURIComponent(s.token)}`;
  }
  isSpectator = spectate;

  ws = new WebSocket(url);
  ws.onopen = () => { $("connDot").classList.add("on"); };
  ws.onmessage = ev => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "welcome") {
      myPlayerId = msg.playerId;
      isSpectator = !!msg.spectator;
      autoReconnect = true;
      // lo spettatore non ha una sessione da conservare (nessun posto al tavolo)
      if (!isSpectator) saveSession({ room: msg.room, name, playerId: msg.playerId, token: msg.token });
      $("roomChip").innerHTML = `stanza <b>${msg.room}</b>` + (isSpectator ? " · 👁 spettatore" : "");
      $("joinScreen").style.display = "none";
      $("gameScreen").classList.add("on");
      return;
    }
    if (msg.type === "state") { lastState = msg.state; render(); }
    if (msg.type === "error") {
      toast(msg.error);
      // l'arena dello sbarco aspetta l'esito con i dadi che girano: se il
      // comando e' stato rifiutato quell'esito non arrivera' mai, e senza
      // questo i dadi resterebbero a girare all'infinito
      if (sbarco && sbarco.fase === "attesa") { closeSbarco(); render(); }
      if (String(msg.error).includes("cannot join") || String(msg.error).includes("Stanza inesistente")) {
        autoReconnect = false;
        $("joinMsg").textContent = "❌ " + msg.error;
      }
    }
  };
  ws.onclose = ev => {
    $("connDot").classList.remove("on");
    if (ev.code === 4002) { autoReconnect = false; toast("Sessione aperta in un'altra scheda"); return; }
    if (autoReconnect) reconnectTimer = setTimeout(() => connect(isSpectator), 2000);
  };
}

function sendCmd(cmd, payload={}) {
  if (isSpectator) return toast("Sei spettatore: non puoi giocare");
  if (!ws || ws.readyState !== 1) return toast("Non connesso");
  ws.send(JSON.stringify({ type:"cmd", cmd, playerId: myPlayerId, payload }));
}

/* ============ costruzione mappa SVG ============ */
function svgEl(tag, attrs={}) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function buildMap(m) {
  const svg = $("map");
  svg.innerHTML = "";
  const gBg = svgEl("g"), gSeas = svgEl("g"), gProv = svgEl("g"), gAtk = svgEl("g", { id:"atkLayer" });
  const gGoal = svgEl("g", { id:"trkGoal" }), gPawns = svgEl("g", { id:"trkPawns" });
  // la freccia d'attacco sta sopra tutto: e' lei a dire cosa sta succedendo
  svg.append(gBg, gSeas, gProv, gGoal, gPawns, gAtk);

  // sfondo: la plancia reale intera, mappa + tracciato punteggi attaccati
  // come sul cartone (nomi e confini gia' stampati sull'immagine)
  gBg.append(svgEl("image", {
    href: "/board.jpg", x:0, y:0, width:VB_FULL.w, height:VB_FULL.h,
    preserveAspectRatio: "none",
  }));

  // i nomi/rotte sono gia' sulla mappa: sopra mettiamo solo i "gettoni"
  // (colore proprietario + numero legioni/triremi) come su una vera plancia
  for (const [id, sea] of Object.entries(m.seas)) {
    const [cx,cy] = SEA_XY[id] || [0,0];
    const g = svgEl("g", { class:"sea", id:`sea_${id}` });
    g.append(svgEl("rect", { class:"seaBox", x:cx, y:cy, width:0, height:0, rx:4 }));
    g.append(svgEl("g", { class:"slots" }));
    g.addEventListener("click", () => onSeaClick(id));
    gSeas.append(g);
  }

  for (const [id, pr] of Object.entries(m.provinces)) {
    const [cx,cy] = PROV_XY[id] || [0,0];
    const g = svgEl("g", { class:"prov", id:`prov_${id}` });
    // bersaglio di tocco piu' largo del gettone: sul telefono il cerchio da
    // r=15 e' pochi millimetri e si manca facilmente. Invisibile, sta sotto.
    g.append(svgEl("circle", { class:"hit", cx, cy, r:PIP_R + 13 }));
    // classe esplicita: il gettone non e' piu' il primo <circle> del gruppo
    g.append(svgEl("circle", { class:"pip", cx, cy, r:PIP_R }));
    const lg = svgEl("text", { class:"lg", x:cx, y:cy+1, "text-anchor":"middle", "dominant-baseline":"central" });
    g.append(lg);
    // centro di potere: uno solo per provincia (§16.4). L'icona sta sopra il
    // gettone, dentro un disco dorato: lo stroke sul testo non funziona con le
    // emoji a colori (glifi bitmap), serve un elemento vero dietro
    const pcy = cy - PIP_R - 12;
    const halo = svgEl("circle", { class:"pcHalo", cx, cy:pcy, r:10 });
    g.append(halo);
    const pc = svgEl("text", {
      class:"pcIcon", x:cx, y:pcy, "text-anchor":"middle", "dominant-baseline":"central",
    });
    g.append(pc);
    g.addEventListener("click", () => onProvClick(id));
    gProv.append(g);
  }
  mapBuilt = true;
}

/* ============ tracciato punteggi (la striscia in fondo alla plancia) ============
   e' parte della stessa immagine di sfondo: le pedine stanno nello stesso SVG
   della mappa, cosi' zoom e pan muovono tutto insieme.
   geometria misurata sulla foto: 41 caselle (0..XL), passo costante */
const TRK = { x0: 35.5, pitch: 29.22, cells: 40, top: 760, bottom: 881 };
const trkX = i => TRK.x0 + TRK.pitch * Math.max(0, Math.min(TRK.cells, i));

/* ============ freccia d'attacco sulla mappa (stile RISK II) ============
   Il collegamento fra attaccante e difensore si vede sulla plancia invece che
   leggerlo come testo nel pannello: l'occhio non deve staccarsi dalla mappa.
   Il badge coi dadi e' cliccabile e cicla 1→2→3. */
const ATK_FX_MS = 5000;

/* Dadi ammessi in un attacco terrestre (§10.5): il difensore tira sempre il
   massimo che puo', min(3, sue legioni), e l'attaccante non puo' usarne di
   meno. Se il minimo supera il massimo disponibile, l'attacco e' impossibile. */
function attackDiceRange(fromId, toId) {
  const min = Math.min(3, prov(toId).legions);
  const max = Math.min(3, prov(fromId).legions - 1);
  return { min, max, ok: max >= min };
}
const clampAtkDice = (fromId, toId) => {
  const r = attackDiceRange(fromId, toId);
  return Math.max(r.min, Math.min(r.max, valNum("atkDice", r.max)));
};
let combatFx = null;      // {t, from, to, rolls, attacker, defender, conquered}
let combatFxTimer = null;
/* combattimento archiviato dal giocatore (ritirata): senza questo, il render
   successivo lo riscoprirebbe come "nuovo" e rimetterebbe la freccia */
let combatFxDismissed = null;

/* accorcia il segmento agli estremi per non coprire i gettoni */
function arrowPoints(a, b, trim) {
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const len = Math.hypot(dx, dy) || 1;
  const ux = dx / len, uy = dy / len;
  return {
    x1: a[0] + ux * trim, y1: a[1] + uy * trim,
    x2: b[0] - ux * trim, y2: b[1] - uy * trim,
    ux, uy, len,
  };
}

/* Linea di mezzeria del cuneo. Dritta fra i due gettoni, salvo `via`: l'attacco
   via mare non taglia la terraferma, si inarca fino a passare per il mare che
   lo rende possibile, cosi' la freccia dice anche DA DOVE sono passate le navi.
   Il punto di controllo e' scelto perche' la curva passi proprio sul mare. */
function centerline(a, b, via) {
  if (!via) return [a, b];
  const c = [2 * via[0] - (a[0] + b[0]) / 2, 2 * via[1] - (a[1] + b[1]) / 2];
  const N = 24, pts = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N, u = 1 - t;
    pts.push([u*u*a[0] + 2*u*t*c[0] + t*t*b[0],
              u*u*a[1] + 2*u*t*c[1] + t*t*b[1]]);
  }
  return pts;
}

/* lunghezza cumulata dei segmenti di una polilinea */
function pathLens(pts) {
  const acc = [0];
  for (let i = 1; i < pts.length; i++) {
    acc.push(acc[i-1] + Math.hypot(pts[i][0] - pts[i-1][0], pts[i][1] - pts[i-1][1]));
  }
  return acc;
}

/* punto sulla polilinea a distanza `s` dall'inizio, con la tangente locale */
function pathAt(pts, acc, s) {
  const tot = acc[acc.length - 1];
  s = Math.max(0, Math.min(tot, s));
  let i = 1;
  while (i < acc.length - 1 && acc[i] < s) i++;
  const seg = acc[i] - acc[i-1] || 1;
  const t = (s - acc[i-1]) / seg;
  const p = [pts[i-1][0] + (pts[i][0] - pts[i-1][0]) * t,
             pts[i-1][1] + (pts[i][1] - pts[i-1][1]) * t];
  const dx = pts[i][0] - pts[i-1][0], dy = pts[i][1] - pts[i-1][1];
  const len = Math.hypot(dx, dy) || 1;
  return { p, ux: dx / len, uy: dy / len };
}

function drawArrow(g, from, to, color, opts = {}) {
  const a = PROV_XY[from], b = PROV_XY[to];
  if (!a || !b) return null;
  // il mare di passaggio inarca la freccia; senza, resta il segmento dritto
  const via = opts.viaSea ? SEA_XY[opts.viaSea] : null;
  const line = centerline(a, b, via);
  const acc0 = pathLens(line);
  const trim = PIP_R + 6;
  const tot = acc0[acc0.length - 1] - trim * 2;
  if (tot < PIP_R * 2) return null;

  // un cuneo unico, come in RISK II: base larga appoggiata al gettone
  // attaccante che si assottiglia fino alla punta sul difensore. Niente linea
  // + <marker>: la forma sola dice gia' chi attacca chi, anche senza colore.
  const BASE = PIP_R * 0.9;   // semilarghezza sull'attaccante
  const NECK = 9;             // semilarghezza dove parte la punta
  const HEAD = 22;            // lunghezza della punta
  // se i due gettoni sono vicini la punta si mangia tutto il cuneo: la accorcia
  const head = Math.min(HEAD, tot * 0.45);
  const neck = Math.min(NECK, BASE);

  // campionatura del tratto utile: uno solo per il cuneo dritto (bastano base,
  // collo e punta), fitta sulla curva, dove il bordo deve seguirla
  const nCamp = via ? 16 : 1;
  const stops = [];
  for (let i = 0; i <= nCamp; i++) stops.push((tot - head) * i / nCamp);
  const sides = stops.map(s => {
    const { p, ux, uy } = pathAt(line, acc0, trim + s);
    const w = BASE + (neck - BASE) * (s / (tot - head || 1));
    return { p, nx: -uy * w, ny: ux * w };
  });
  const tip = pathAt(line, acc0, trim + tot).p;

  const su = sides.map(s => `${s.p[0] + s.nx},${s.p[1] + s.ny}`);
  const sd = sides.map(s => `${s.p[0] - s.nx},${s.p[1] - s.ny}`).reverse();
  g.append(svgEl("polygon", {
    class: "atkWedge" + (opts.alt ? " alt" : opts.pending ? " pending" : ""), fill: color,
    points: [...su, `${tip[0]},${tip[1]}`, ...sd].join(" "),
  }));
  // etichetta e dadi vanno a meta' del tratto utile: sulla curva il punto medio
  // fra i due estremi cadrebbe sulla terraferma, lontano dalla freccia
  const mid = pathAt(line, acc0, trim + tot / 2).p;
  return { mx: mid[0], my: mid[1] };
}

function renderAttackArrow(st) {
  const g = $("atkLayer");
  if (!g) return;
  g.innerHTML = "";

  const ph = st.turn.phase;
  // il bersaglio dev'essere ancora nemico: dopo una conquista la selezione
  // resta, ma puntare una freccia d'attacco su una provincia diventata tua
  // non vuol dire niente
  const aiming = (ph === "LAND_ATTACKS" || ph === "SEA_ATTACKS") && !st.pending.occupation
    && isMyTurn() && ui.sel.from && ui.sel.to
    && isMine(ui.sel.from) && isEnemy(ui.sel.to);
  // stessa coppia appena combattuta e ancora selezionata: una freccia sola,
  // con i dadi dell'esito sopra e il badge di mira al centro, cosi' si puo'
  // rilanciare subito senza aspettare che l'effetto svanisca
  const samePair = aiming && combatFx && combatFx.from === ui.sel.from && combatFx.to === ui.sel.to;

  if (combatFx && combatFx.from && combatFx.to && !samePair) {
    const c = COLOR_HEX[combatFx.attacker] || "#ccc";
    const m = drawArrow(g, combatFx.from, combatFx.to, c, { viaSea: combatFx.sea });
    if (m) drawCombatFx(g, m, combatFx);
  }

  if (!aiming) return;

  // sulla mappa resta il solo cuneo: i dadi, la loro scelta e i limiti di
  // §10.5 sono affare dell'arena, ripeterli qui sporcava la plancia
  const col = COLOR_HEX[myColor()] || "#ccc";

  if (ph === "SEA_ATTACKS") {
    // finche' la rotta non e' decisa si disegnano tutte quelle possibili: la
    // scelta si vede sulla plancia, e si fa toccando il mare
    const rotte = rotteBuone(ui.sel.from, ui.sel.to);
    const scelta = rotte.includes(ui.vals.saSea) ? ui.vals.saSea : null;
    const da = scelta ? [scelta] : rotte;
    let mid = null;
    da.forEach(sid => {
      const m = drawArrow(g, ui.sel.from, ui.sel.to, col,
        { pending: !!scelta, alt: !scelta && da.length > 1, viaSea: sid });
      if (!mid) mid = m;
    });
    if (mid && samePair) drawCombatFx(g, mid, combatFx);
    return;
  }

  const mid = drawArrow(g, ui.sel.from, ui.sel.to, col, { pending: true });
  if (!mid) return;
  if (samePair) drawCombatFx(g, mid, combatFx);
}

/* dadi dell'ultimo tiro, sopra la freccia */
function drawCombatFx(g, mid, fx) {
  const last = fx.rolls[fx.rolls.length - 1];
  if (!last) return;
  const atk = (last.att || []).map(v => DIE_FACE[v-1] || "?").join("");
  const def = (last.def || []).map(v => DIE_FACE[v-1] || "?").join("");
  const box = svgEl("g", { class: "atkFx" });
  const txt = `${atk} ⚔ ${def}`;
  const w = Math.max(96, txt.length * 11);
  box.append(svgEl("rect", { x: mid.mx - w/2, y: mid.my - 40, width: w, height: 30, rx: 8 }));
  const t = svgEl("text", { x: mid.mx, y: mid.my - 25, "text-anchor":"middle", "dominant-baseline":"central" });
  t.textContent = txt;
  box.append(t);
  if (fx.conquered) {
    const c = svgEl("text", { class:"atkWin", x: mid.mx, y: mid.my + 30, "text-anchor":"middle", "dominant-baseline":"central" });
    c.textContent = "CONQUISTA!";
    box.append(c);
  }
  g.append(box);
}

/* mari in comune fra due province: la traversata puo' avere piu' di una rotta
   e la si sceglie nell'arena. `ui.vals.saSea` tiene la scelta corrente. */
function mariComuni(from, to) {
  if (!from || !to || !prov(from) || !prov(to)) return [];
  return prov(from).adj_sea.filter(s => prov(to).adj_sea.includes(s));
}
/* §12.2: si passa solo dai mari dove si hanno piu' triremi del difensore.
   I neutrali non hanno flotta, quindi lassu' basta una trireme. */
function superioritaNavale(sid, defColor) {
  const mie = myTriremes(sid);
  if (mie < 1) return false;
  const dif = defColor && !String(defColor).startsWith("NEUTRAL_")
    ? (sea(sid).triremes || {})[defColor] || 0 : 0;
  return mie > dif;
}
function rotteBuone(from, to) {
  return mariComuni(from, to).filter(sid => superioritaNavale(sid, prov(to).owner));
}
function mareScelto(from, to) {
  // fra i mari in comune si sceglie fra quelli dove la traversata e' possibile
  const buone = rotteBuone(from, to);
  const c = buone.length ? buone : mariComuni(from, to);
  if (!c.length) return null;
  return c.includes(ui.vals.saSea) ? ui.vals.saSea : c[0];
}
/* c'e' almeno un bersaglio raggiungibile da questa provincia? Serve a non
   accendere basi da cui poi non si potrebbe partire per nessuna rotta */
function haBersagliVieMare(from) {
  const colpite = new Set(lastState.turn.seaAttackedProvinces || []);
  return Object.keys(lastState.map.provinces).some(
    id => isEnemy(id) && !colpite.has(id) && rotteBuone(from, id).length);
}

/* registra l'esito quando arriva uno stato con un combattimento nuovo */
function noteCombatFx(st) {
  const lc = st.lastCombat;
  if (!lc || (lc.kind !== "land" && lc.kind !== "sea") || !lc.rolls || !lc.rolls.length) return;
  if (combatFx && combatFx.t === lc.t) return;
  if (combatFxDismissed === lc.t) return;   // ritirata: non riproporlo
  // se l'arena e' aperta su questa coppia, il tiro si guarda li'. Va fatto
  // PRIMA di ogni uscita anticipata: e' la chiamata che ferma i dadi, saltarla
  // li lascia a girare per sempre
  if (duel && duel.rolling && lc.from === duel.from && lc.to === duel.to && lc.t !== duel.shownT) {
    duel.shownT = lc.t;
    duelSettle(lc);
  }
  // via mare il server risolve tutto lo scontro in un colpo: l'arena lo
  // ripercorre tiro per tiro invece di sbatterti in faccia il risultato
  if (lc.kind === "sea" && sbarco && sbarco.fase === "attesa"
      && lc.from === sbarco.from && lc.to === sbarco.to) {
    sbarcoReplay(lc);
    return;   // la freccia coi dadi la disegna l'arena a fine replay
  }
  // conquista tua: l'esito lo stai gia' guardando nel riquadro, e sulla mappa
  // conta solo il territorio che cambia colore. Per gli altri giocatori invece
  // la freccia coi dadi resta: e' il loro unico modo di vedere cos'e' successo
  if (lc.conquered && lc.attacker === myColor()) {
    combatFxDismissed = lc.t;
    // via anche quella del tiro precedente: ha un timer suo e resterebbe
    // appesa sulla provincia appena presa
    clearTimeout(combatFxTimer);
    combatFx = null;
    return;
  }
  combatFx = { t: lc.t, from: lc.from, to: lc.to, rolls: lc.rolls, sea: lc.sea,
    attacker: lc.attacker, defender: lc.defender, conquered: lc.conquered };
  clearTimeout(combatFxTimer);
  combatFxTimer = setTimeout(() => { combatFx = null; renderAttackArrow(lastState); }, ATK_FX_MS);
}

/* ============ arena dei dadi ============
   Il secondo tocco sul bersaglio non tira piu' di nascosto: apre questo
   riquadro, dove si sceglie quanti dadi usare e si guarda il tiro. Resta
   aperto dopo l'esito, perche' sulla stessa provincia si insiste quasi
   sempre piu' volte di fila. */
const DUEL_ROLL_MS = 800;    // quanto girano prima di fermarsi
const DUEL_SETTLE_MS = 130;  // scarto fra un dado e il successivo

let duel = null; // {from, to, rolling, shownT, faces, result, startedAt}
let duelSpin = null;

function openDuel(from, to) {
  duel = { from, to, rolling: false, shownT: lastState.lastCombat ? lastState.lastCombat.t : 0,
    faces: null, result: null,
    // forze all'inizio dello scontro: servono per il bilancio finale, quando
    // sul tabellone restano solo i sopravvissuti
    start: { a: prov(from).legions, d: prov(to).legions } };
  renderDuel();
}
/* niente render() qui dentro: closeDuel viene chiamata anche DA render */
function closeDuel() {
  clearInterval(duelSpin); duelSpin = null;
  duel = null;
  $("duelWrap").classList.remove("on");
}

function duelRoll() {
  if (!duel || duel.rolling) return;
  const dice = clampAtkDice(duel.from, duel.to);
  const defN = Math.min(3, prov(duel.to).legions);
  duel.rolling = true;
  duel.result = null;
  duel.startedAt = Date.now();
  duel.faces = { att: Array(dice).fill(1), def: Array(defN).fill(1) };
  // le legioni si aggiornano appena il server risponde: congelale, altrimenti
  // il conteggio rivela l'esito mentre i dadi stanno ancora girando
  duel.frozen = { a: prov(duel.from).legions, d: prov(duel.to).legions,
    owner: prov(duel.to).owner };
  // le facce girano finche' non arriva l'esito dal server
  clearInterval(duelSpin);
  duelSpin = setInterval(() => {
    if (!duel || !duel.faces) return;
    const r = () => 1 + Math.floor(Math.random() * 6);
    duel.faces.att = duel.faces.att.map(r);
    duel.faces.def = duel.faces.def.map(r);
    renderDuel();
  }, 80);
  renderDuel();
  sendCmd("land_attack_roll", { from: duel.from, to: duel.to, attackDice: dice });
}

/* esito arrivato dal server: ferma i dadi, ma mai prima di DUEL_ROLL_MS,
   altrimenti in locale il server risponde cosi' in fretta che il tiro non
   si vede nemmeno */
function duelSettle(lc) {
  const wait = Math.max(0, DUEL_ROLL_MS - (Date.now() - duel.startedAt));
  setTimeout(() => {
    if (!duel) return;
    clearInterval(duelSpin); duelSpin = null;
    const last = lc.rolls[lc.rolls.length - 1];
    duel.faces = { att: [...last.att], def: [...last.def] };
    duel.result = { att: last.att, def: last.def, attLoss: last.attLoss,
      defLoss: last.defLoss, conquered: lc.conquered };
    // il contatore somma tutto lo scontro su questa provincia, non il solo tiro
    duel.totLoss = duel.totLoss || { att: 0, def: 0 };
    duel.totLoss.att += last.attLoss;
    duel.totLoss.def += last.defLoss;
    // i dadi si fermano uno alla volta, non tutti insieme
    const tot = Math.max(duel.faces.att.length, duel.faces.def.length);
    duel.settling = tot;
    renderDuel();
    for (let i = 0; i <= tot; i++) {
      setTimeout(() => {
        if (!duel) return;
        duel.settling = tot - i;
        if (i === tot) duel.rolling = false;
        renderDuel();
      }, i * DUEL_SETTLE_MS);
    }
  }, wait);
}

/* ===== le statuine in campo =====
   Come sul tavolo: un pezzo per legione, e sopra le 19 si passa ai sigilli da
   10, altrimenti non ci starebbero. Quando le perdite superano i legionari
   singoli si "rompe" un sigillo: lo si barra e tornano in campo i suoi 10,
   esattamente il cambio che si fa con le pedine vere. */
const SIGILLO = 10;
const SOGLIA_SIGILLI = 19;   // fino a 19 tutti singoli, da 20 in su i sigilli

/* n legioni -> quanti sigilli e quanti pezzi singoli */
function scomponi(n) {
  if (n <= SOGLIA_SIGILLI) return { sigilli: 0, singoli: n };
  const sigilli = Math.floor(n / SIGILLO);
  return { sigilli, singoli: n - sigilli * SIGILLO };
}

function statuinaEl(color, fallen) {
  const s = svgEl("svg", { class: "statuina" + (fallen ? " fallen" : ""), viewBox: "0 0 14 20", width: 14, height: 20 });
  // elmo + corpo: una sagoma sola, leggibile anche a 14px
  s.append(svgEl("path", {
    d: "M7 1 C4.5 1 3 2.6 3 4.6 L3 6.2 C3 7 3.4 7.6 4 7.9 L3.2 9 C1.8 10.2 1 12 1 14.2 L1 18.5 L13 18.5 L13 14.2 C13 12 12.2 10.2 10.8 9 L10 7.9 C10.6 7.6 11 7 11 6.2 L11 4.6 C11 2.6 9.5 1 7 1 Z",
    fill: color, stroke: "#0b111a", "stroke-width": 1,
  }));
  return s;
}

function sigilloEl(color, rotto) {
  const g = svgEl("svg", { class: "sigillo" + (rotto ? " rotto" : ""), viewBox: "0 0 22 22", width: 22, height: 22 });
  g.append(svgEl("circle", { cx: 11, cy: 11, r: 9.2, fill: color, stroke: "#0b111a", "stroke-width": 1.4 }));
  const t = svgEl("text", { x: 11, y: 11.5, "text-anchor": "middle", "dominant-baseline": "central" });
  t.textContent = "10";
  g.append(t);
  if (rotto) {
    // la X del cambio: questo sigillo e' stato sciolto in 10 legionari
    g.append(svgEl("path", { d: "M3 3 L19 19 M19 3 L3 19", stroke: "#ff5f5f", "stroke-width": 2.6, "stroke-linecap": "round" }));
  }
  return g;
}

/* Schiera le legioni di un lato. `prima` e' la forza all'inizio del tiro e
   `perse` le perdite appena subite: la scomposizione va fatta sullo stato di
   partenza, altrimenti il sigillo si "aggiusta" da solo e il cambio non si
   vede mai. I caduti restano in campo barrati fino al tiro successivo. */
function schieraEl(prima, perse, color) {
  perse = perse || 0;
  const wrap = el("div", { class: "duelForza" });
  if (prima <= 0) { wrap.append(el("span", { class:"forzaVuota" }, "—")); return wrap; }

  let { sigilli, singoli } = scomponi(prima);
  let rotti = 0;
  // perdite piu' grandi dei legionari singoli: si scioglie un sigillo e i suoi
  // 10 tornano in campo, poi si pagano le perdite
  if (perse > singoli && sigilli > 0) {
    rotti = Math.min(sigilli, Math.ceil((perse - singoli) / SIGILLO));
    sigilli -= rotti;
    singoli += rotti * SIGILLO;
  }
  const attivi = Math.max(0, singoli - perse);
  const caduti = Math.min(perse, singoli);

  for (let i = 0; i < sigilli; i++) wrap.append(sigilloEl(color, false));
  for (let i = 0; i < rotti; i++) wrap.append(sigilloEl(color, true));
  for (let i = 0; i < attivi; i++) wrap.append(statuinaEl(color, false));
  for (let i = 0; i < caduti; i++) wrap.append(statuinaEl(color, true));

  wrap.append(el("div", { class:"forzaTot" }, String(prima - perse)));
  return wrap;
}

function dieEl(v, color, spinning, mark) {
  const cls = "dieBig" + (spinning ? " rolling" : mark ? " " + mark : "");
  return el("span", { class: cls, style: `color:${color}` }, DIE_FACE[v-1] || "?");
}

/* Il cuneo fra due dadi: stessa forma della freccia d'attacco sulla mappa,
   base sul dado che vince e punta su quello che perde. `versoDestra` = ha
   vinto l'attaccante (che sta a sinistra). */
function cuneoEl(versoDestra, color) {
  const W = 40, H = 22, BASE = 7, NECK = 3.5, HEAD = 13;
  const s = svgEl("svg", { class:"duelCuneo", viewBox:`0 0 ${W} ${H}`, width:W, height:H });
  const cy = H / 2;
  // coordinate della coda (lato vincente) e della punta (lato perdente)
  const x0 = versoDestra ? 3 : W - 3;
  const x1 = versoDestra ? W - 3 : 3;
  const kx = versoDestra ? x1 - HEAD : x1 + HEAD;
  s.append(svgEl("polygon", {
    fill: color, stroke: "#0b111a", "stroke-width": 1, "stroke-linejoin": "round",
    points: [
      `${x0},${cy - BASE}`, `${kx},${cy - NECK}`, `${x1},${cy}`,
      `${kx},${cy + NECK}`, `${x0},${cy + BASE}`,
    ].join(" "),
  }));
  return s;
}

/* ===== vista di conquista =====
   Vinto lo scontro, il riquadro smette di essere un'arena e diventa il momento
   in cui si decide quante legioni entrano nella provincia presa. In cima il
   bilancio della battaglia: con quanti si e' partiti e quanti sono caduti. */
function renderDuelVittoria(box, a, d, atkCol, defCol, defName) {
  const occ = lastState.pending.occupation;
  box.append(el("div", { class:"duelTitle duelWin" }, `Conquista di ${d.name}! 🏛️`));

  const st0 = duel.start || { a: a.legions, d: d.legions };
  const tot = duel.totLoss || { att: 0, def: 0 };
  const stat = el("div", { class:"duelStats" });
  const colonna = (titolo, color, iniziali, perse) => {
    const c = el("div", { class:"statCol" });
    c.append(el("div", { class:"statWho", style:`color:${color}` }, titolo));
    c.append(el("div", { class:"statRiga" },
      el("span", { class:"statNum" }, String(iniziali)), " all'inizio"));
    c.append(el("div", { class:"statRiga" },
      el("span", { class:"statNum statPerse" }, `−${perse}`), " caduti"));
    // "superstiti", non "rimasti": sul tabellone questi uomini sono gia'
    // divisi fra provincia di partenza e provincia presa
    c.append(el("div", { class:"statRiga statResto" },
      el("span", { class:"statNum" }, String(iniziali - perse)), " superstiti"));
    return c;
  };
  stat.append(colonna("Attacco", atkCol, st0.a, tot.att),
    el("div", { class:"duelGap" }),
    colonna("Difesa", defCol, st0.d, tot.def));
  box.append(stat);

  // niente occupazione in sospeso (es. gia' risolta): resta solo il bilancio
  if (!occ) {
    const btns = el("div", { class:"duelBtns" });
    const b = el("button", {}, "Chiudi");
    b.onclick = () => { closeDuel(); render(); };
    btns.append(b);
    box.append(btns);
    return;
  }

  // §14.2: nella provincia di partenza deve restare la guarnigione minima
  const maxN = a.legions - minGarrisonOf(duel.from);
  if (maxN <= 0) {
    box.append(el("div", { class:"duelSub", style:"margin-top:10px" },
      `Da ${a.name} non puoi spostare altre legioni: deve restarci la guarnigione.`));
    const btns = el("div", { class:"duelBtns" });
    const b = el("button", {}, "Va bene");
    b.onclick = () => { closeDuel(); render(); };
    btns.append(b);
    box.append(btns);
    return;
  }

  if (duel.sposta === undefined) duel.sposta = maxN;
  duel.sposta = Math.max(0, Math.min(maxN, duel.sposta));

  box.append(el("div", { class:"duelSub", style:"margin-top:12px" },
    `Quante legioni entrano in ${d.name}?`));

  // le due schiere si dividono sotto gli occhi: chi resta e chi avanza
  const split = el("div", { class:"duelRow duelSplit" });
  const restano = a.legions - duel.sposta;
  const entrano = d.legions + duel.sposta;
  const lato = (nome, n) => {
    const c = el("div", { class:"statCol" });
    c.append(el("div", { class:"statWho" }, nome));
    c.append(schieraEl(n, 0, atkCol));
    return c;
  };
  split.append(lato(a.name, restano), el("div", { class:"duelVs" }, "→"),
    lato(d.name, entrano));
  box.append(split);

  const pick = el("div", { class:"duelPick" });
  const meno = el("button", {}, "−");
  meno.onclick = () => { duel.sposta--; renderDuel(); };
  meno.disabled = duel.sposta <= 0;
  const piu = el("button", {}, "+");
  piu.onclick = () => { duel.sposta++; renderDuel(); };
  piu.disabled = duel.sposta >= maxN;
  const q = el("span", { class:"duelQta" }, String(duel.sposta));
  const range = el("input", { type:"range", min:"0", max:String(maxN), value:String(duel.sposta), class:"duelRange" });
  range.oninput = e => { duel.sposta = Number(e.target.value); renderDuel(); };
  pick.append(meno, q, piu);
  box.append(pick, range);

  const btns = el("div", { class:"duelBtns" });
  const go = el("button", {}, duel.sposta > 0 ? `Sposta ${duel.sposta} →` : "Non spostare");
  go.onclick = () => {
    if (duel.sposta > 0) sendCmd("occupy_extra", { count: duel.sposta });
    ui.sel = {};   // quel bersaglio non esiste piu': si riparte da capo
    closeDuel(); render();
  };
  btns.append(go);
  box.append(btns);
}

function renderDuel() {
  const wrap = $("duelWrap"), box = $("duelBox");
  if (!duel || !lastState) { wrap.classList.remove("on"); return; }
  wrap.classList.add("on");
  box.innerHTML = "";

  const a = prov(duel.from), d = prov(duel.to);
  const atkCol = COLOR_HEX[myColor()] || "#ccc";
  const defCol = ownerFill((duel.frozen && duel.frozen.owner) || d.owner);
  const rg = attackDiceRange(duel.from, duel.to);

  // il difensore ha un nome, non un colore: "Marco", non "BLUE". Va preso da
  // frozen: appena conquisti, l'owner e' gia' tuo e il riquadro finirebbe per
  // dire che stavi combattendo contro te stesso
  const defOwn = String((duel.frozen && duel.frozen.owner) || d.owner || "?");
  const defPl = lastState.players.find(p => p.color === defOwn);
  const defName = defPl ? defPl.name
    : defOwn.startsWith("NEUTRAL_") ? "Neutrali" : defOwn;

  // vinta: il riquadro cambia mestiere e passa allo spostamento
  if (duel.result && duel.result.conquered && !duel.rolling) {
    renderDuelVittoria(box, a, d, atkCol, defCol, defName);
    return;
  }

  // dopo una conquista le legioni sul tabellone non descrivono piu' lo scontro
  // appena visto: si resta sui numeri di partenza finche' il riquadro e' su
  const tieni = duel.rolling || (duel.result && duel.result.conquered);
  const fz = tieni && duel.frozen ? duel.frozen : { a: a.legions, d: d.legions };
  box.append(el("div", { class:"duelTitle" }, `${a.name} → ${d.name}`));
  box.append(el("div", { class:"duelSub" }, `${fz.a} legioni contro ${fz.d}`));

  // quante facce mostrare: durante il tiro quelle che girano, a riposo la
  // scelta corrente contro quelle che il difensore tirera'
  const dice = clampAtkDice(duel.from, duel.to);
  const defN = Math.min(3, d.legions);
  const faces = duel.faces || { att: Array(Math.max(0, dice)).fill(1), def: Array(defN).fill(1) };
  const res = duel.result;

  // i dadi si affrontano in verticale, dal piu' alto al piu' basso: ogni riga
  // e' un duello fra il dado dell'attaccante e quello del difensore di pari
  // rango, come si allineano sul tavolo
  const ordina = arr => [...arr].sort((x, y) => y - x);
  const att = ordina(faces.att), def = ordina(faces.def);

  const arena = el("div", { class:"duelArena" });
  const head = el("div", { class:"duelRow duelHead" });
  head.append(el("div", { class:"duelWho", style:`color:${atkCol}` }, "Tu"),
    el("div", { class:"duelVs" }, "⚔"),
    el("div", { class:"duelWho", style:`color:${defCol}` }, defName));
  arena.append(head);

  const righe = Math.max(att.length, def.length);
  for (let i = 0; i < righe; i++) {
    const riga = el("div", { class:"duelRow" });
    // i dadi si fermano uno alla volta: quelli ancora in coda girano
    const spinning = n => duel.rolling && (!res || i >= n - (duel.settling || 0));
    const sfida = att[i] !== undefined && def[i] !== undefined;
    // §10.5: il difensore vince la parita'
    const attVince = sfida && att[i] > def[i];
    const mostraEsito = sfida && res && !duel.rolling;

    riga.append(att[i] !== undefined
      ? dieEl(att[i], atkCol, spinning(att.length), mostraEsito ? (attVince ? "won" : "lost") : null)
      : el("span", { class:"dieVuoto" }, "·"));
    // il cuneo punta dal dado che vince a quello che perde: stessa forma della
    // freccia sulla mappa, cosi' si legge senza spiegazioni
    riga.append(mostraEsito ? cuneoEl(attVince, attVince ? atkCol : defCol)
      : el("div", { class:"duelGap" }));
    riga.append(def[i] !== undefined
      ? dieEl(def[i], defCol, spinning(def.length), mostraEsito ? (attVince ? "lost" : "won") : null)
      : el("span", { class:"dieVuoto" }, "·"));
    arena.append(riga);
  }

  // le statuine in campo: mentre i dadi girano restano quelle di partenza,
  // le perdite compaiono solo quando i dadi si sono fermati. La forza e' quella
  // a inizio tiro: dopo un esito le legioni sul tabellone sono gia' decurtate,
  // e sommarci i caduti li conterebbe due volte
  const base = duel.frozen && (duel.rolling || res) ? duel.frozen : { a: a.legions, d: d.legions };
  const perse = s => res && !duel.rolling ? (s === "att" ? res.attLoss : res.defLoss) : 0;
  const forze = el("div", { class:"duelRow duelForze" });
  forze.append(schieraEl(base.a, perse("att"), atkCol),
    el("div", { class:"duelGap" }),
    schieraEl(base.d, perse("def"), defCol));
  arena.append(forze);
  box.append(arena);

  // perdite totali dello scontro su questa provincia, non solo dell'ultimo tiro
  const tot = duel.totLoss || { att: 0, def: 0 };
  const cnt = el("div", { class:"duelRow duelCount" });
  cnt.append(el("div", { class:"lossA" }, `perdite: ${tot.att}`),
    el("div", { class:"duelGap" }),
    el("div", { class:"lossD" }, `perdite: ${tot.def}`));
  box.append(cnt);

  const loss = el("div", { class:"duelLoss" });
  if (res && !duel.rolling) {
    if (res.attLoss) loss.append(el("span", { class:"lossA" }, `−${res.attLoss} tue `));
    if (res.defLoss) loss.append(el("span", { class:"lossD" }, `−${res.defLoss} sue`));
    if (!res.attLoss && !res.defLoss) loss.append("nessuna perdita");
  }
  box.append(loss);

  // selettore dadi: attivo solo quando c'e' davvero una scelta
  if (!duel.rolling && rg.ok) {
    const pick = el("div", { class:"duelPick" });
    pick.append(el("span", { class:"lbl" }, "Dadi:"));
    for (let n = 1; n <= 3; n++) {
      const usable = n >= rg.min && n <= rg.max;
      const b = el("button", { class: n === dice ? "sel" : "" }, String(n));
      if (!usable) b.disabled = true;
      else b.onclick = () => { ui.vals.atkDice = n; renderDuel(); render(); };
      pick.append(b);
    }
    if (rg.min === rg.max) {
      pick.append(el("span", { class:"lbl", style:"margin-left:6px" },
        `obbligati (il difensore ne tira ${rg.min})`));
    }
    box.append(pick);
  }
  if (!rg.ok) {
    box.append(el("div", { class:"duelWarn" },
      `Non puoi attaccare: servono almeno ${rg.min + 1} legioni in ${a.name}, ` +
      `il difensore tira ${rg.min} dadi e non puoi usarne di meno.`));
  }

  const btns = el("div", { class:"duelBtns" });
  if (rg.ok) {
    const b = el("button", {}, duel.rolling ? "…" : res ? "Tira ancora" : "Tira!");
    b.disabled = duel.rolling;
    b.onclick = duelRoll;
    btns.append(b);
  }
  // ritirarsi = smettere di tirare su questa provincia. Se il sangue e' gia'
  // stato versato lo si dice, e si molla anche la mira: la freccia sparisce e
  // si riparte scegliendo un altro bersaglio. Prima del primo tiro non c'e'
  // niente da cui ritirarsi, e' solo un ripensamento.
  const ritirata = !!res;
  const close = el("button", { class: ritirata ? "ritira" : "" },
    ritirata ? "🏳 Ritirati" : rg.ok ? "Annulla" : "Chiudi");
  close.disabled = duel.rolling;
  close.onclick = () => {
    if (ritirata) {
      ui.sel = {};
      // via anche la freccia dell'ultimo scontro: ritirarsi vuol dire che
      // sulla mappa non resta traccia dell'attacco appena abbandonato
      clearTimeout(combatFxTimer);
      if (lastState.lastCombat) combatFxDismissed = lastState.lastCombat.t;
      combatFx = null;
    }
    closeDuel();
    render();
  };
  btns.append(close);
  box.append(btns);
}

/* ============ arena dello sbarco (§12) ============
   Stessa grammatica dell'arena terrestre — cuneo sulla mappa, dadi che girano,
   statuine che cadono — con le due differenze che il regolamento impone:
   la forza si dichiara PRIMA di salpare ed e' quella che sbarchera', e non ci
   si puo' ritirare: si combatte a oltranza finche' un lato e' annientato.
   Il server risolve tutto lo scontro in un comando solo, quindi qui i tiri si
   ripercorrono uno alla volta invece di mostrare il risultato secco. */
const SBARCO_SPIN_MS = 420;    // quanto girano i dadi a ogni tiro
const SBARCO_SPIN1_MS = 750;   // il primo dura di piu': e' quello che "apre"
const SBARCO_HOLD_MS = 620;    // pausa a dadi fermi, per leggere l'esito

let sbarco = null;   // {from,to,seaId,legioni,fase,start,cur,tot,rolls,idx,faces}
let sbarcoSpin = null, sbarcoTimer = null;

function openSbarco(from, to) {
  const seaId = mareScelto(from, to);
  if (!seaId) return;
  const max = maxSbarco(from);
  if (max < 1) return toast(`Da ${prov(from).name} non puoi imbarcare nessuno: ` +
    "deve restarci la guarnigione minima.");
  sbarco = {
    from, to, seaId, fase: "imbarco",
    // di default salpa tutto il salpabile: a oltranza mandarne pochi e' un
    // suicidio, e chi vuole rischiare abbassa il cursore apposta
    legioni: max,
    start: { a: prov(from).legions, d: prov(to).legions },
    tot: { att: 0, def: 0 },
  };
  renderSbarco();
}

/* §14.3: la guarnigione minima resta a terra e non si imbarca */
function maxSbarco(from) {
  return Math.max(0, prov(from).legions - minGarrisonOf(from));
}

function closeSbarco() {
  clearInterval(sbarcoSpin); sbarcoSpin = null;
  clearTimeout(sbarcoTimer); sbarcoTimer = null;
  sbarco = null;
  $("duelWrap").classList.remove("on");
}

function salpa() {
  if (!sbarco || sbarco.fase !== "imbarco") return;
  const { from, to, seaId, legioni } = sbarco;
  sbarco.fase = "attesa";
  // le forze in campo durante lo scontro: solo quelle imbarcate, non tutta la
  // provincia di partenza. Chi resta a casa non fa parte di questa battaglia
  sbarco.cur = { a: legioni, d: prov(to).legions };
  sbarco.faces = { att: Array(Math.min(3, legioni)).fill(1),
    def: Array(Math.min(3, prov(to).legions)).fill(1) };
  sbarco.rolling = true;
  clearInterval(sbarcoSpin);
  sbarcoSpin = setInterval(() => {
    if (!sbarco || !sbarco.faces) return;
    const r = () => 1 + Math.floor(Math.random() * 6);
    sbarco.faces.att = sbarco.faces.att.map(r);
    sbarco.faces.def = sbarco.faces.def.map(r);
    renderSbarco();
  }, 80);
  renderSbarco();
  sendCmd("sea_attack", { from, to, seaId, legions: legioni });
  // se l'esito non arriva (connessione caduta, comando perso) l'arena non deve
  // restare appesa: si chiude e lo si dice, invece di far girare i dadi a vuoto
  clearTimeout(sbarcoTimer);
  sbarcoTimer = setTimeout(() => {
    if (sbarco && sbarco.fase === "attesa") {
      closeSbarco(); render();
      toast("Nessuna risposta dal server: lo sbarco non è partito.");
    }
  }, 8000);
}

/* Lo scontro e' arrivato dal server gia' risolto per intero (§12.3: a oltranza,
   non c'e' niente da decidere a meta'), ma i tiri NON si srotolano da soli:
   li scopre il giocatore uno alla volta, con lo stesso gesto dell'arena
   terrestre. I dadi che vede sono quelli veri del server, non ne rilanciamo di
   nuovi: qui si decide solo il ritmo con cui vengono svelati. */
function sbarcoReplay(lc) {
  sbarco.rolls = lc.rolls;
  sbarco.conquered = lc.conquered;
  sbarco.idx = -1;        // nessun tiro ancora scoperto
  sbarco.applicati = 0;   // ne' contato
  sbarco.res = null;
  sbarco.rolling = false;
  sbarco.faces = null;
  sbarco.fase = "battaglia";
  renderSbarco();
}

/* un tiro: i dadi girano, poi si fermano e le legioni cadono */
function sbarcoTira() {
  // `inCorso` copre anche la pausa fra dadi fermi e legioni che cadono: senza,
  // un secondo tocco in quella finestra faceva ripartire il tiro successivo e
  // le perdite di quello appena visto non venivano mai contate
  if (!sbarco || sbarco.rolling || sbarco.inCorso || sbarco.fase !== "battaglia") return;
  sbarco.inCorso = true;
  sbarco.idx++;
  if (sbarco.idx >= sbarco.rolls.length) return sbarcoFine();

  const r = sbarco.rolls[sbarco.idx];
  sbarco.rolling = true;
  sbarco.res = null;
  sbarco.faces = { att: r.att.map(() => 1), def: r.def.map(() => 1) };

  clearInterval(sbarcoSpin);
  sbarcoSpin = setInterval(() => {
    if (!sbarco || !sbarco.faces) return;
    const d = () => 1 + Math.floor(Math.random() * 6);
    sbarco.faces.att = sbarco.faces.att.map(d);
    sbarco.faces.def = sbarco.faces.def.map(d);
    renderSbarco();
  }, 80);
  renderSbarco();

  sbarcoTimer = setTimeout(() => {
    if (!sbarco) return;
    clearInterval(sbarcoSpin); sbarcoSpin = null;
    sbarco.faces = { att: [...r.att], def: [...r.def] };
    sbarco.res = r;
    sbarco.rolling = false;
    renderSbarco();   // un attimo con le perdite ancora in piedi: si vedono cadere
    sbarcoTimer = setTimeout(() => {
      if (!sbarco || sbarco.res !== r) return;
      applicaTiro(r);
      sbarco.inCorso = false;
      // l'ultimo tiro non lascia niente da premere: si passa al bilancio
      if (sbarco.applicati >= sbarco.rolls.length) sbarcoFine();
      // render() e non renderSbarco(): cosi' anche il gettone sulla mappa
      // scala tiro dopo tiro insieme alle statuine nell'arena
      else render();
    }, SBARCO_HOLD_MS);
  }, sbarco.idx === 0 ? SBARCO_SPIN1_MS : SBARCO_SPIN_MS);
}

/* perdite di un tiro scaricate sul campo. `applicati` tiene il conto di quelli
   gia' contati: e' l'unica cosa che dice a che punto siamo, sia che i tiri li
   scopra uno per uno sia che salti alla fine */
function applicaTiro(r) {
  sbarco.cur.a -= r.attLoss;
  sbarco.cur.d -= r.defLoss;
  sbarco.tot.att += r.attLoss;
  sbarco.tot.def += r.defLoss;
  sbarco.applicati++;
}

/* "Salta": chi ha gia' capito come va a finire non deve premere altre 11 volte */
function sbarcoSalta() {
  if (!sbarco || sbarco.fase !== "battaglia") return;
  clearInterval(sbarcoSpin); sbarcoSpin = null;
  clearTimeout(sbarcoTimer); sbarcoTimer = null;
  while (sbarco.applicati < sbarco.rolls.length) applicaTiro(sbarco.rolls[sbarco.applicati]);
  sbarco.idx = sbarco.rolls.length;
  sbarco.faces = null;
  sbarco.res = null;      // fa scadere l'eventuale tiro ancora in volo
  sbarco.rolling = false;
  sbarco.inCorso = false;
  sbarcoFine();
}

function sbarcoFine() {
  sbarco.fase = "esito";
  sbarco.rolling = false;
  // il congelamento cade proprio adesso: la provincia cambia colore sulla
  // mappa nello stesso istante in cui l'arena annuncia com'e' andata
  render();
  // sulla mappa resta la traccia dello scontro, come per gli attacchi
  // terrestri: la conquista pero' la stai gia' guardando qui dentro
  const lc = lastState && lastState.lastCombat;
  if (lc && lc.kind === "sea" && !lc.conquered) {
    combatFx = { t: lc.t, from: lc.from, to: lc.to, rolls: lc.rolls, sea: lc.sea,
      attacker: lc.attacker, defender: lc.defender, conquered: false };
    clearTimeout(combatFxTimer);
    combatFxTimer = setTimeout(() => { combatFx = null; renderAttackArrow(lastState); }, ATK_FX_MS);
  }
  renderAttackArrow(lastState);
}

function renderSbarco() {
  const wrap = $("duelWrap"), box = $("duelBox");
  if (!sbarco || !lastState) { wrap.classList.remove("on"); return; }
  wrap.classList.add("on");
  box.innerHTML = "";

  const a = prov(sbarco.from), d = prov(sbarco.to);
  const atkCol = COLOR_HEX[myColor()] || "#ccc";
  // il difensore va congelato: appena conquisti la provincia e' gia' tua e il
  // riquadro finirebbe per dirti che combattevi contro te stesso
  if (!sbarco.defOwner) sbarco.defOwner = d.owner;
  const defCol = ownerFill(sbarco.defOwner);
  const defPl = lastState.players.find(p => p.color === sbarco.defOwner);
  const defName = defPl ? defPl.name
    : String(sbarco.defOwner || "?").startsWith("NEUTRAL_") ? "Neutrali" : String(sbarco.defOwner);

  box.append(el("div", { class:"duelTitle" }, `${a.name} ⛵ ${d.name}`));

  if (sbarco.fase === "imbarco") return renderSbarcoImbarco(box, a, d, atkCol, defCol);
  if (sbarco.fase === "esito") return renderSbarcoEsito(box, a, d, atkCol, defCol, defName);

  // ===== la battaglia: identica all'arena terrestre, senza scelta dei dadi =====
  // il numero totale di tiri NON si mostra: e' vero che il server ha gia'
  // risolto tutto, ma dirlo ("tiro 3 di 12") anticiperebbe quanto durera' lo
  // scontro, cioe' mezzo risultato
  box.append(el("div", { class:"duelSub" },
    sbarco.fase === "attesa" ? `via ${sea(sbarco.seaId).name} · si salpa…`
      : sbarco.idx < 0 ? `via ${sea(sbarco.seaId).name} · sbarco in corso`
      : `via ${sea(sbarco.seaId).name} · tiro ${sbarco.idx + 1}`));

  // prima del primo tiro i dadi stanno in tavola a riposo: tanti quanti ne
  // tirera' ciascun lato con le forze attuali (§10.5: al massimo tre)
  const faces = sbarco.faces || { att: Array(Math.min(3, Math.max(0, sbarco.cur.a))).fill(1),
    def: Array(Math.min(3, Math.max(0, sbarco.cur.d))).fill(1) };
  const ordina = arr => [...arr].sort((x, y) => y - x);
  const att = ordina(faces.att), def = ordina(faces.def);
  const res = !sbarco.rolling ? sbarco.res : null;

  const arena = el("div", { class:"duelArena" });
  const head = el("div", { class:"duelRow duelHead" });
  head.append(el("div", { class:"duelWho", style:`color:${atkCol}` }, "Sbarco"),
    el("div", { class:"duelVs" }, "⚔"),
    el("div", { class:"duelWho", style:`color:${defCol}` }, defName));
  arena.append(head);

  const righe = Math.max(att.length, def.length);
  for (let i = 0; i < righe; i++) {
    const riga = el("div", { class:"duelRow" });
    const sfida = att[i] !== undefined && def[i] !== undefined;
    const attVince = sfida && att[i] > def[i];   // §10.5: la parita' e' del difensore
    const mostraEsito = sfida && !!res;
    riga.append(att[i] !== undefined
      ? dieEl(att[i], atkCol, sbarco.rolling, mostraEsito ? (attVince ? "won" : "lost") : null)
      : el("span", { class:"dieVuoto" }, "·"));
    riga.append(mostraEsito ? cuneoEl(attVince, attVince ? atkCol : defCol)
      : el("div", { class:"duelGap" }));
    riga.append(def[i] !== undefined
      ? dieEl(def[i], defCol, sbarco.rolling, mostraEsito ? (attVince ? "lost" : "won") : null)
      : el("span", { class:"dieVuoto" }, "·"));
    arena.append(riga);
  }

  // in campo ci sono solo gli imbarcati: chi e' rimasto a presidiare la
  // provincia di partenza non c'entra con questa battaglia
  const perse = s => res ? (s === "att" ? res.attLoss : res.defLoss) : 0;
  const forze = el("div", { class:"duelRow duelForze" });
  forze.append(schieraEl(sbarco.cur.a, perse("att"), atkCol),
    el("div", { class:"duelGap" }),
    schieraEl(sbarco.cur.d, perse("def"), defCol));
  arena.append(forze);
  box.append(arena);

  const cnt = el("div", { class:"duelRow duelCount" });
  cnt.append(el("div", { class:"lossA" }, `perdite: ${sbarco.tot.att}`),
    el("div", { class:"duelGap" }),
    el("div", { class:"lossD" }, `perdite: ${sbarco.tot.def}`));
  box.append(cnt);

  // i tiri li tira il giocatore, come a terra. Quello che manca rispetto
  // all'arena terrestre e' la ritirata: §12.3 non la contempla, si va avanti
  // finche' uno dei due eserciti non esiste piu'
  const btns = el("div", { class:"duelBtns" });
  if (sbarco.fase === "battaglia") {
    const occupato = sbarco.rolling || sbarco.inCorso;
    const b = el("button", { class:"salpa" },
      occupato ? "…" : sbarco.idx < 0 ? "Tira! 🎲" : "Tira ancora");
    b.disabled = occupato;
    b.onclick = sbarcoTira;
    btns.append(b);
    const s = el("button", {}, "Salta »");
    s.disabled = sbarco.rolling;
    s.onclick = sbarcoSalta;
    btns.append(s);
  }
  box.append(btns);
}

/* ===== imbarco: la scelta che non si puo' piu' cambiare ===== */
function renderSbarcoImbarco(box, a, d, atkCol, defCol) {
  const max = maxSbarco(sbarco.from);
  box.append(el("div", { class:"duelSub" },
    `${d.legions} legioni a difesa di ${d.name}`));

  // la rotta: se i due lidi si affacciano su piu' mari, si sceglie da quale.
  // I mari senza superiorita' restano in elenco, spenti e col perche': sparire
  // in silenzio lasciava il dubbio di un bug invece della regola (§12.2)
  const rotte = mariComuni(sbarco.from, sbarco.to);
  if (rotte.length > 1) {
    const pick = el("div", { class:"duelPick" });
    pick.append(el("span", { class:"lbl" }, "Rotta:"));
    rotte.forEach(sid => {
      const ok = superioritaNavale(sid, sbarco.defOwner);
      const b = el("button", { class: sid === sbarco.seaId ? "sel" : "" }, sea(sid).name);
      if (!ok) {
        b.disabled = true;
        const mie = myTriremes(sid);
        const loro = (sea(sid).triremes || {})[sbarco.defOwner] || 0;
        b.title = `Triremi: tu ${mie}, lui ${loro}. Ne servono di più (§12.2).`;
      } else {
        b.onclick = () => { sbarco.seaId = sid; ui.vals.saSea = sid; renderSbarco(); render(); };
      }
      pick.append(b);
    });
    box.append(pick);
    if (rotte.some(sid => !superioritaNavale(sid, sbarco.defOwner))) {
      box.append(el("div", { class:"duelSub", style:"margin-top:4px" },
        "Le rotte spente sono mari dove non hai più triremi del difensore."));
    }
  }

  sbarco.legioni = Math.max(1, Math.min(max, sbarco.legioni));
  box.append(el("div", { class:"duelSub", style:"margin-top:12px" },
    `Quante legioni salpano da ${a.name}?`));

  // le due schiere si dividono sotto gli occhi: chi presidia e chi si imbarca
  const split = el("div", { class:"duelRow duelSplit" });
  const lato = (nome, n) => {
    const c = el("div", { class:"statCol" });
    c.append(el("div", { class:"statWho" }, nome));
    c.append(schieraEl(n, 0, atkCol));
    return c;
  };
  split.append(lato(`restano a ${a.name}`, a.legions - sbarco.legioni),
    el("div", { class:"duelVs" }, "⛵"),
    lato("salpano", sbarco.legioni));
  box.append(split);

  const pick = el("div", { class:"duelPick" });
  const meno = el("button", {}, "−");
  meno.onclick = () => { sbarco.legioni--; renderSbarco(); };
  meno.disabled = sbarco.legioni <= 1;
  const piu = el("button", {}, "+");
  piu.onclick = () => { sbarco.legioni++; renderSbarco(); };
  piu.disabled = sbarco.legioni >= max;
  pick.append(meno, el("span", { class:"duelQta" }, String(sbarco.legioni)), piu);
  box.append(pick);

  const range = el("input", { type:"range", min:"1", max:String(Math.max(1, max)),
    value:String(sbarco.legioni), class:"duelRange" });
  range.oninput = e => { sbarco.legioni = Number(e.target.value); renderSbarco(); };
  box.append(range);

  // il punto in cui l'attacco via mare smette di somigliare a quello terrestre
  box.append(el("div", { class:"duelWarn sbarcoWarn" },
    "⚔️ Si combatte a oltranza: non ci si può ritirare. " +
