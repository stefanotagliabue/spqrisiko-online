<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPQRisiKo MVP</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 12px; }
      input, button { font-size: 16px; padding: 10px; }
      #log {
        white-space: pre-wrap;
        border: 1px solid #ddd;
        padding: 10px;
        margin-top: 10px;
        height: 55vh;
        overflow: auto;
        border-radius: 10px;
        background: #fafafa;
      }
      .row { display: flex; gap: 8px; margin: 8px 0; }
      .row > * { flex: 1; }
      .small { font-size: 13px; opacity: 0.8; }
      h3 { margin-bottom: 8px; }
    </style>
  </head>

  <body>
    <h3>SPQRisiKo MVP — Setup & GameState</h3>

    <!-- Connessione -->
    <div class="row">
      <input id="name" placeholder="Nome (es. Marco)" />
      <input id="room" placeholder="Stanza (es. ABCD12)" />
    </div>

    <div class="row">
      <button id="create">Crea stanza</button>
      <button id="connect">Connetti</button>
    </div>

    <!-- Lobby -->
    <div class="row">
      <button id="ready">Ready</button>
      <button id="start">Start Game</button>
      <button id="reset">Reset Game</button>
    </div>

    <!-- SETUP -->
    <div class="row">
      <input id="prov" list="provListFree" placeholder="Tua provincia" />
      <input id="nprov" list="provListFree" placeholder="Provincia neutrale (se richiesta)" />
    </div>

    <datalist id="provListFree"></datalist>
    <datalist id="provListAll"></datalist>
    <datalist id="seaList"></datalist>

    <div class="row">
      <button id="claim">Claim (SETUP)</button>
    </div>

    <div class="row">
      <button id="reinforceBegin">Reinforce Begin (SCORE)</button>
    </div>

    <!-- TRIS -->
    <div class="row">
      <input id="trisCards" placeholder="Indici carte (es. 0,1,2)" />
      <input id="trisSeas" list="seaList" placeholder="Mari triremi (opz., es. TYRRENUM)" />
      <input id="trisPc" list="provListAll" placeholder="Provincia centro potere (opz.)" />
      <button id="trisGo">Gioca Tris</button>
    </div>

    <div class="row">
      <input id="placements" placeholder='Placements es: ITALIA:2,CISALPINA:1' />
    </div>
    <div class="row">
      <button id="reinforcePlace">Place Reinforcements</button>
    </div>

    <!-- LAND ATTACKS -->
    <div class="row">
      <input id="atkFrom" list="provListAll" placeholder="Attack from (provincia tua)" />
      <input id="atkTo" list="provListAll" placeholder="Attack to (provincia nemica)" />
    </div>
    <div class="row">
      <input id="atkDice" placeholder="Dadi attacco (1-3)" value="3" />
      <button id="atkRoll">Land Attack (roll)</button>
    </div>

    <!-- NAVALE -->
    <div class="row">
      <input id="t2lSea" list="seaList" placeholder="Mare (trireme da convertire)" />
      <input id="t2lProv" list="provListAll" placeholder="Provincia (+2 legioni)" />
      <button id="t2lGo">Trireme → Legioni</button>
    </div>

    <div class="row">
      <input id="btProv" list="provListAll" placeholder="Provincia (-3 legioni)" />
      <input id="btSea" list="seaList" placeholder="Mare (+1 trireme)" />
      <button id="btGo">Compra Trireme</button>
    </div>

    <div class="row">
      <input id="nmFrom" list="seaList" placeholder="Mare da" />
      <input id="nmTo" list="seaList" placeholder="Mare a" />
      <input id="nmCount" placeholder="Quante triremi" />
      <button id="nmGo">Movimento Navale</button>
    </div>

    <div class="row">
      <input id="ncSea" list="seaList" placeholder="Mare" />
      <input id="ncTarget" placeholder="Colore bersaglio (es. BLUE)" />
      <input id="ncDice" placeholder="Dadi (1-3)" value="3" />
      <button id="ncGo">Attacco Navale (roll)</button>
    </div>

    <div class="row">
      <input id="saFrom" list="provListAll" placeholder="Da (tua provincia)" />
      <input id="saTo" list="provListAll" placeholder="A (provincia nemica)" />
      <input id="saSea" list="seaList" placeholder="Mare ponte" />
      <input id="saLegions" placeholder="Legioni" />
      <button id="saGo">Attacco Via Mare</button>
    </div>

    <div class="row">
      <button id="endPhase">Fine Fase (navale)</button>
    </div>

    <div class="row">
      <input id="occCount" placeholder="Legioni extra da spostare" />
      <button id="occExtra">Occupy Extra (post-conquista)</button>
    </div>

    <div class="row">
      <button id="endAttacks">Fine Attacchi</button>
      <button id="endTurn">Fine Turno</button>
    </div>

    <!-- STRATEGIC MOVE -->
    <div class="row">
      <input id="smFrom" list="provListAll" placeholder="Spostamento da" />
      <input id="smTo" list="provListAll" placeholder="Spostamento a" />
      <input id="smCount" placeholder="Quante" />
      <button id="smGo">Strategic Move</button>
    </div>

    <!-- Debug -->
    <div class="row">
      <button id="advance">Avanza fase (debug)</button>
      <button id="clear">Pulisci log</button>
    </div>

    <div class="small">
      • Usa l’autocomplete per scegliere province valide<br/>
      • In SETUP, se richiesto, devi scegliere anche la provincia neutrale
    </div>

    <div id="log"></div>

    <script>
      let ws = null;
      let myPlayerId = null;

      const CLIENT_VERSION = "index-v3-autocomplete";
      const logEl = document.getElementById("log");

      const log = (x) => {
        logEl.textContent += x + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      };

      log(`🧩 client version: ${CLIENT_VERSION}`);

      const genRoom = () => {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let s = "";
        for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
        return s;
      };

      const connect = () => {
        const name = (document.getElementById("name").value.trim() || "anon");
        const room = (document.getElementById("room").value.trim().toUpperCase() || "LOBBY");

        const url = `ws://${location.host}/ws/${encodeURIComponent(room)}/${encodeURIComponent(name)}`;
        ws = new WebSocket(url);

        ws.onopen = () => log(`✅ connesso in stanza ${room}`);

        ws.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);

          if (msg.type === "welcome") {
            myPlayerId = msg.playerId;
            log(`👤 playerId: ${myPlayerId}`);
            return;
          }

          if (msg.type === "join") log(`🟢 ${msg.player} è entrato`);
          if (msg.type === "leave") log(`🔴 ${msg.player} è uscito`);

          if (msg.type === "state") {
            const st = msg.state;
            const phase = st.turn.phase;
            const round = st.turn.round;
            const idx = st.turn.turnIndex;

            const playersLine = st.players.map(p => {
              const r = p.eliminated ? "💀" : (p.ready ? "✅" : "⬜");
              const c = p.color ? `(${p.color})` : "";
              const score = p.score !== undefined ? ` ⭐${p.score}` : "";
              const cards = p.cards ? ` 🃏${p.cards.length}` : "";
              return `${r} ${p.name}${c}${score}${cards}`;
            }).join(" | ");

            log(`📌 round=${round} phase=${phase} turnIndex=${idx}`);
            log(`👥 ${playersLine}`);
            if (st.winner) log(`🏆 VINCITORE: ${st.winner}`);

            // carte in mano (debug: visibili tutte)
            const cardLines = st.players
              .filter(p => p.cards && p.cards.length)
              .map(p => `${p.name}: ` + p.cards.map((c, i) => `${i}=${c.symbol}`).join(","));
            if (cardLines.length) log(`🃏 ${cardLines.join(" | ")}`);

            // centri di potere
            if (st.map && st.map.provinces) {
              const pcs = Object.keys(st.map.provinces)
                .filter(id => st.map.provinces[id].power_center)
                .map(id => `${id}(${st.map.provinces[id].owner})`);
              if (pcs.length) log(`🏟️ ${pcs.join(" | ")}`);
            }

            // triremi in gioco
            if (st.map && st.map.seas) {
              const seaLines = Object.keys(st.map.seas)
                .filter(id => Object.keys(st.map.seas[id].triremes || {}).length > 0)
                .map(id => {
                  const t = st.map.seas[id].triremes;
                  return `${id}: ` + Object.keys(t).map(c => `${c}=${t[c]}`).join(",");
                });
              if (seaLines.length) log(`⛵ ${seaLines.join(" | ")}`);

              const dlSea = document.getElementById("seaList");
              if (dlSea && !dlSea.children.length) {
                dlSea.innerHTML = Object.keys(st.map.seas).sort()
                  .map(id => `<option value="${id}"></option>`).join("");
              }
            }

            
            // aggiorna datalist province
            if (st.map && st.map.provinces) {
              const provinces = st.map.provinces;

              // --- PROVINCE LIBERE (SETUP) ---
              const dlFree = document.getElementById("provListFree");
              if (dlFree) {
                const freeIds = Object.keys(provinces)
                  .filter(id => provinces[id] && provinces[id].owner === null)
                  .sort();
                dlFree.innerHTML = freeIds.map(id => `<option value="${id}"></option>`).join("");
              }

              // --- TUTTE LE PROVINCE (ATTACCHI / DEBUG) ---
              const dlAll = document.getElementById("provListAll");
              if (dlAll) {
                const allIds = Object.keys(provinces).sort();
                dlAll.innerHTML = allIds.map(id => `<option value="${id}"></option>`).join("");
              }

              // pulizia input se diventano invalidi (solo setup)
              const provEl = document.getElementById("prov");
              const nprovEl = document.getElementById("nprov");

              if (provEl) {
                const v = provEl.value.trim().toUpperCase();
                if (v && provinces[v] && provinces[v].owner !== null) provEl.value = "";
              }
              if (nprovEl) {
                const v = nprovEl.value.trim().toUpperCase();
                if (v && provinces[v] && provinces[v].owner !== null) nprovEl.value = "";
              }
            }

          }

          if (msg.type === "error") log(`❌ ERROR: ${msg.error}`);
        };

        ws.onclose = () => log("❌ disconnesso");
      };

      const sendCmd = (cmd, payload = {}) => {
        if (!ws || ws.readyState !== 1) return log("⚠️ non connesso");
        if (!myPlayerId) return log("⚠️ manca welcome/playerId");
        ws.send(JSON.stringify({ type: "cmd", cmd, playerId: myPlayerId, payload }));
      };

      // --- UI handlers ---
      document.getElementById("create").onclick = () => {
        const r = genRoom();
        document.getElementById("room").value = r;
        log(`🔑 stanza creata: ${r}`);
      };

      document.getElementById("connect").onclick = () => connect();
      document.getElementById("ready").onclick = () => sendCmd("ready");
      document.getElementById("start").onclick = () => sendCmd("start_game");
      document.getElementById("reset").onclick = () => sendCmd("reset_game");
      document.getElementById("advance").onclick = () => sendCmd("advance_phase");
      document.getElementById("clear").onclick = () => (logEl.textContent = "");

      document.getElementById("claim").onclick = () => {
        const provinceId = document.getElementById("prov").value.trim().toUpperCase();
        const neutralProvinceId = document.getElementById("nprov").value.trim().toUpperCase();

        log(`🧪 DEBUG claim -> provinceId='${provinceId}' neutral='${neutralProvinceId}'`);

        if (!provinceId) {
          log("❌ Inserisci la tua provincia");
          return;
        }

        const payload = { provinceId };
        if (neutralProvinceId) payload.neutralProvinceId = neutralProvinceId;

        sendCmd("setup_claim", payload);
      };

      document.getElementById("reinforceBegin").onclick = () => sendCmd("reinforce_land_begin");

    document.getElementById("trisGo").onclick = () => {
      const cardsRaw = document.getElementById("trisCards").value.trim();
      if (!cardsRaw) return log("❌ Inserisci gli indici delle 3 carte (es. 0,1,2)");
      const cards = cardsRaw.split(",").map(x => parseInt(x.trim(), 10));
      if (cards.length !== 3 || cards.some(isNaN)) return log("❌ Servono 3 indici numerici");

      const payload = { cards };
      const seasRaw = document.getElementById("trisSeas").value.trim();
      if (seasRaw) payload.triremeSeas = seasRaw.split(",").map(x => x.trim().toUpperCase());
      const pc = document.getElementById("trisPc").value.trim().toUpperCase();
      if (pc) payload.powerCenterProvince = pc;

      sendCmd("play_tris", payload);
    };

      document.getElementById("reinforcePlace").onclick = () => {
        const s = document.getElementById("placements").value.trim();
        if (!s) return log("❌ Inserisci placements (es: ITALIA:2,CISALPINA:1)");

        const placements = {};
        for (const part of s.split(",")) {
          const [k, v] = part.split(":").map(x => x.trim());
          if (!k || !v) return log(`❌ formato non valido: '${part}'`);
          placements[k.toUpperCase()] = parseInt(v, 10);
        }

        sendCmd("reinforce_land_place", { placements });
      };

      document.getElementById("atkRoll").onclick = () => {
      const from = document.getElementById("atkFrom").value.trim().toUpperCase();
      const to = document.getElementById("atkTo").value.trim().toUpperCase();
      const attackDice = parseInt(document.getElementById("atkDice").value.trim(), 10) || 3;

      if (!from || !to) {
        log("❌ Inserisci atkFrom e atkTo");
        return;
      }

      sendCmd("land_attack_roll", { from, to, attackDice });
    };

    document.getElementById("occExtra").onclick = () => {
      const count = parseInt(document.getElementById("occCount").value.trim(), 10);
      if (!count || count < 1) return log("❌ Inserisci quante legioni extra spostare");
      sendCmd("occupy_extra", { count });
    };

    document.getElementById("endAttacks").onclick = () => sendCmd("end_attacks");
    document.getElementById("endTurn").onclick = () => sendCmd("end_turn");
    document.getElementById("endPhase").onclick = () => sendCmd("end_phase");

    document.getElementById("t2lGo").onclick = () => {
      const seaId = document.getElementById("t2lSea").value.trim().toUpperCase();
      const provinceId = document.getElementById("t2lProv").value.trim().toUpperCase();
      if (!seaId || !provinceId) return log("❌ Inserisci mare e provincia");
      sendCmd("trireme_to_legions", { seaId, provinceId });
    };

    document.getElementById("btGo").onclick = () => {
      const provinceId = document.getElementById("btProv").value.trim().toUpperCase();
      const seaId = document.getElementById("btSea").value.trim().toUpperCase();
      if (!provinceId || !seaId) return log("❌ Inserisci provincia e mare");
      sendCmd("buy_trireme", { provinceId, seaId });
    };

    document.getElementById("nmGo").onclick = () => {
      const fromSea = document.getElementById("nmFrom").value.trim().toUpperCase();
      const toSea = document.getElementById("nmTo").value.trim().toUpperCase();
      const count = parseInt(document.getElementById("nmCount").value.trim(), 10);
      if (!fromSea || !toSea || !count) return log("❌ Inserisci da/a/quante");
      sendCmd("naval_move", { fromSea, toSea, count });
    };

    document.getElementById("ncGo").onclick = () => {
      const seaId = document.getElementById("ncSea").value.trim().toUpperCase();
      const targetColor = document.getElementById("ncTarget").value.trim().toUpperCase();
      const attackDice = parseInt(document.getElementById("ncDice").value.trim(), 10) || 3;
      if (!seaId || !targetColor) return log("❌ Inserisci mare e colore bersaglio");
      sendCmd("naval_attack_roll", { seaId, targetColor, attackDice });
    };

    document.getElementById("saGo").onclick = () => {
      const from = document.getElementById("saFrom").value.trim().toUpperCase();
      const to = document.getElementById("saTo").value.trim().toUpperCase();
      const seaId = document.getElementById("saSea").value.trim().toUpperCase();
      const legions = parseInt(document.getElementById("saLegions").value.trim(), 10);
      if (!from || !to || !seaId || !legions) return log("❌ Inserisci da/a/mare/legioni");
      sendCmd("sea_attack", { from, to, seaId, legions });
    };

    document.getElementById("smGo").onclick = () => {
      const from = document.getElementById("smFrom").value.trim().toUpperCase();
      const to = document.getElementById("smTo").value.trim().toUpperCase();
      const count = parseInt(document.getElementById("smCount").value.trim(), 10);
      if (!from || !to || !count) return log("❌ Inserisci da/a/quante per lo spostamento");
      sendCmd("strategic_move", { from, to, count });
    };

    </script>
  </body>
</html>
