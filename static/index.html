    "Chi salpa vince e sbarca, oppure muore in mare."));

  const btns = el("div", { class:"duelBtns" });
  const go = el("button", { class:"salpa" }, `Salpa con ${sbarco.legioni} ⛵`);
  go.onclick = salpa;
  const ann = el("button", {}, "Annulla");
  ann.onclick = () => { closeSbarco(); render(); };
  btns.append(go, ann);
  box.append(btns);
}

/* ===== esito: qui non si sceglie niente, il regolamento ha gia' deciso ===== */
function renderSbarcoEsito(box, a, d, atkCol, defCol, defName) {
  const vinto = sbarco.conquered;
  box.append(el("div", { class: vinto ? "duelTitle duelWin" : "duelTitle duelLose" },
    vinto ? `Sbarco riuscito: ${d.name} è tua! 🏛️`
      : `Lo sbarco su ${d.name} è fallito`));
  const n = sbarco.cur.a;
  box.append(el("div", { class:"duelSub" },
    vinto ? `${n} ${n === 1 ? "legione sbarcata" : "legioni sbarcate"} · via ${sea(sbarco.seaId).name}`
      : `Nessuno è tornato indietro · via ${sea(sbarco.seaId).name}`));

  const stat = el("div", { class:"duelStats" });
  const colonna = (titolo, color, iniziali, perse) => {
    const c = el("div", { class:"statCol" });
    c.append(el("div", { class:"statWho", style:`color:${color}` }, titolo));
    c.append(el("div", { class:"statRiga" },
      el("span", { class:"statNum" }, String(iniziali)), " imbarcati"));
    c.append(el("div", { class:"statRiga" },
      el("span", { class:"statNum statPerse" }, `−${perse}`), " caduti"));
    const resto = Math.max(0, iniziali - perse);
    c.append(el("div", { class:"statRiga statResto" },
      el("span", { class:"statNum" }, String(resto)), resto === 1 ? " superstite" : " superstiti"));
    return c;
  };
  const colDif = colonna(defName, defCol, sbarco.start.d, sbarco.tot.def);
  // "imbarcati" vale solo per chi e' salpato: il difensore era gia' a casa sua
  colDif.querySelectorAll(".statRiga")[0].lastChild.textContent = " a difesa";
  stat.append(colonna("Sbarco", atkCol, sbarco.legioni, sbarco.tot.att),
    el("div", { class:"duelGap" }), colDif);
  box.append(stat);

  const btns = el("div", { class:"duelBtns" });
  const b = el("button", {}, vinto ? "Va bene" : "Chiudi");
  b.onclick = () => { ui.sel = {}; closeSbarco(); render(); };
  btns.append(b);
  box.append(btns);
}

function renderScoreTrack(st) {
  // casella dell'obiettivo: un bordo evidenziato, come segnare la meta'
  const goal = $("trkGoal");
  goal.innerHTML = "";
  const tgt = st.settings && st.settings.targetScore;
  if (tgt > 0 && tgt <= TRK.cells) {
    goal.append(svgEl("rect", {
      x: trkX(tgt) - 13, y: TRK.top - 2, width: 26, height: TRK.bottom - TRK.top + 4, rx: 4,
      fill: "none", stroke: "#ffd75e", "stroke-width": 3, opacity: 0.95,
    }));
  }

  // una pedina per giocatore sulla casella del suo punteggio; chi condivide
  // la casella si impila (le caselle sono alte, ci stanno tutti)
  const pawns = $("trkPawns");
  pawns.innerHTML = "";
  const byCell = {};
  for (const p of st.players || []) {
    const i = Math.max(0, Math.min(TRK.cells, p.score || 0));
    (byCell[i] = byCell[i] || []).push(p);
  }
  for (const [cell, list] of Object.entries(byCell)) {
    const cx = trkX(Number(cell));
    list.forEach((p, k) => {
      const cy = TRK.top + 15 + k * 20;  // fino a 6 giocatori nella stessa casella
      const g = svgEl("g");
      g.append(svgEl("circle", {
        cx, cy, r: 9.5, fill: COLOR_HEX[p.color] || "#666",
        stroke: "#2b1608", "stroke-width": 1.6,
      }));
      const t = svgEl("text", {
        x: cx, y: cy + 0.5, "text-anchor":"middle", "dominant-baseline":"central",
        "font-size": 11, "font-weight": 700, fill: "#fff",
        stroke: "#2b1608", "stroke-width": 2, "paint-order": "stroke",
      });
      t.textContent = String(p.score || 0);
      g.append(t);
      const tip = svgEl("title", {});
      tip.textContent = `${p.name}: ${p.score || 0} punti`;
      g.append(tip);
      pawns.append(g);
    });
  }
}

/* ============ pan & zoom mappa (dita e mouse) ============ */
/* la plancia intera: mappa (0..700) + tracciato punteggi (700..919) */
const VB_FULL = { x: 0, y: 0, w: 1240, h: 919 };
const VB = { ...VB_FULL };
let dragSuppressClick = false;

function applyVB() {
  $("map").setAttribute("viewBox", `${VB.x} ${VB.y} ${VB.w} ${VB.h}`);
}

const MOBILE_MQ = window.matchMedia("(max-width: 820px), (max-height: 500px)");

function containerAspect() {
  // il "cover" a schermo intero vale solo nel layout telefono (stesso
  // breakpoint del CSS mobile); su desktop resta l'aspect fisso della mappa,
  // cosi' il comportamento con mappa intera visibile e bande laterali non
  // cambia
  if (!MOBILE_MQ.matches) return VB_FULL.w / VB_FULL.h;
  const r = $("mapWrap").getBoundingClientRect();
  return (r.width > 0 && r.height > 0) ? r.width / r.height : VB_FULL.w / VB_FULL.h;
}

function clampVB() {
  const M = 260; // margine oltre i bordi, per lo zoom indietro estremo
  const AR = containerAspect();
  // la viewBox segue sempre l'aspect ratio reale del contenitore (schermo
  // verticale incluso): niente lettera-boxing, la mappa riempie lo schermo
  // e si può scorrere/zoomare restando entro un margine dai bordi. Il limite
  // di zoom indietro copre l'intera mappa (puo' lasciare un bordo vuoto se
  // l'aspect e' molto diverso da quello della mappa: e' una scelta esplicita
  // di zoom, non la vista di default).
  const maxW = Math.max(VB_FULL.w, VB_FULL.h * AR);
  VB.w = Math.max(200, Math.min(maxW, VB.w));
  VB.h = VB.w / AR;

  const xLo = VB_FULL.x - M, xHi = VB_FULL.x + VB_FULL.w + M - VB.w;
  VB.x = xHi >= xLo ? Math.max(xLo, Math.min(xHi, VB.x)) : VB_FULL.x + (VB_FULL.w - VB.w) / 2;
  const yLo = VB_FULL.y - M, yHi = VB_FULL.y + VB_FULL.h + M - VB.h;
  VB.y = yHi >= yLo ? Math.max(yLo, Math.min(yHi, VB.y)) : VB_FULL.y + (VB_FULL.h - VB.h) / 2;
}

function fitVBDefault() {
  // vista di default: la mappa riempie lo schermo senza bordi vuoti,
  // ritagliando la dimensione in eccesso rispetto all'aspect del contenitore
  // (l'utente può comunque zoomare indietro fino a vedere tutta la mappa,
  // vedi clampVB)
  const AR = containerAspect();
  const w = Math.max(200, Math.min(VB_FULL.w, VB_FULL.h * AR));
  VB.w = w;
  VB.h = w / AR;
  VB.x = VB_FULL.x + (VB_FULL.w - VB.w) / 2;
  VB.y = VB_FULL.y + (VB_FULL.h - VB.h) / 2;
}

function svgCoords(clientX, clientY) {
  const r = $("map").getBoundingClientRect();
  return { x: VB.x + (clientX - r.left) / r.width * VB.w,
           y: VB.y + (clientY - r.top) / r.height * VB.h };
}

function zoomAt(cx, cy, factor) {
  const w = VB.w * factor;
  VB.x = cx - (cx - VB.x) * (w / VB.w);
  VB.y = cy - (cy - VB.y) * (w / VB.w);
  VB.w = w;
  clampVB(); applyVB();
}

function initMapGestures() {
  const svg = $("map");
  const pts = new Map(); // pointerId -> {x, y} (coordinate client)
  let moved = false, pinchDist = 0, startPt = null;
  let longPressTimer = null;
  const cancelLongPress = () => { clearTimeout(longPressTimer); longPressTimer = null; };

  svg.addEventListener("pointerdown", e => {
    // NIENTE setPointerCapture qui: col mouse la capture fa recapitare il click
    // all'elemento che cattura (l'<svg>) invece che al gruppo della provincia,
    // e onProvClick non parte mai. La capture serve solo mentre si trascina,
    // quindi la prendiamo dopo, quando il gesto diventa davvero un pan.
    pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pts.size === 1) {
      moved = false;
      startPt = { x: e.clientX, y: e.clientY };
      cancelLongPress();
      const g = e.target.closest(".prov, .sea");
      if (g) {
        const kind = g.classList.contains("prov") ? "prov" : "sea";
        const id = g.id.slice(kind.length + 1);
        const cx = e.clientX, cy = e.clientY;
        longPressTimer = setTimeout(() => {
          longPressTimer = null;
          const items = tileMenuItemsFor(kind, id);
          if (items.length) { dragSuppressClick = true; openTileMenu(cx, cy, items); }
        }, 450);
      }
    }
    if (pts.size === 2) {
      cancelLongPress();
      const [a, b] = [...pts.values()];
      pinchDist = Math.hypot(a.x - b.x, a.y - b.y);
    }
  });
  svg.addEventListener("pointermove", e => {
    if (!pts.has(e.pointerId)) return;
    const prev = pts.get(e.pointerId);
    const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
    pts.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pts.size === 1) {
      // La tolleranza del tap va misurata dall'INIZIO del gesto, non fra due
      // eventi consecutivi: col confronto evento-per-evento un dito che trema
      // di pochi pixel faceva scattare "trascinamento" e il click spariva.
      const far = startPt && (Math.hypot(e.clientX - startPt.x, e.clientY - startPt.y) > 10);
      if (moved || far) {
        if (!moved) { try { svg.setPointerCapture(e.pointerId); } catch {} }
        moved = true;
        cancelLongPress();
        const r = svg.getBoundingClientRect();
        VB.x -= dx / r.width * VB.w;
        VB.y -= dy / r.height * VB.h;
        clampVB(); applyVB();
      }
    } else if (pts.size === 2) {
      moved = true;
      const [a, b] = [...pts.values()];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      if (pinchDist > 0 && dist > 0) {
        const mid = svgCoords((a.x + b.x) / 2, (a.y + b.y) / 2);
        zoomAt(mid.x, mid.y, pinchDist / dist);
      }
      pinchDist = dist;
    }
  });
  const end = e => {
    pts.delete(e.pointerId);
    try { svg.releasePointerCapture(e.pointerId); } catch {}
    cancelLongPress();
    if (pts.size === 0 && moved) dragSuppressClick = true;
  };
  svg.addEventListener("pointerup", end);
  svg.addEventListener("pointercancel", end);

  // il click dopo un trascinamento non deve selezionare nulla
  svg.addEventListener("click", e => {
    if (dragSuppressClick) { dragSuppressClick = false; e.stopPropagation(); }
  }, true);

  svg.addEventListener("wheel", e => {
    e.preventDefault();
    const p = svgCoords(e.clientX, e.clientY);
    zoomAt(p.x, p.y, e.deltaY > 0 ? 1.15 : 1 / 1.15);
  }, { passive: false });

  $("zoomIn").onclick = () => zoomAt(VB.x + VB.w / 2, VB.y + VB.h / 2, 1 / 1.3);
  $("zoomOut").onclick = () => zoomAt(VB.x + VB.w / 2, VB.y + VB.h / 2, 1.3);
  $("zoomReset").onclick = () => { fitVBDefault(); applyVB(); };

  window.addEventListener("resize", () => { clampVB(); applyVB(); });
  window.addEventListener("orientationchange", () => { clampVB(); applyVB(); });
}

/* ============ helper di gioco ============ */
const me = () => lastState && lastState.players.find(p => p.id === myPlayerId);
const myColor = () => (me() || {}).color;
const turnPlayer = () => lastState.players[lastState.turn.turnIndex];
const isMyTurn = () => turnPlayer() && turnPlayer().id === myPlayerId;
const prov = id => lastState.map.provinces[id];
const sea = id => lastState.map.seas[id];
const isMine = id => prov(id).owner === myColor();
const isEnemy = id => prov(id).owner !== null && prov(id).owner !== myColor();
const isFree = id => prov(id).owner === null;
const placedTotal = () => Object.values(ui.placements).reduce((a,b)=>a+b,0);
/* regola casa "garrison-first": province mie a 1 legione con vicino terrestre nemico */
const garrisonDeficits = () => Object.keys(lastState.map.provinces).filter(id => {
  const pr = prov(id);
  return pr.owner === myColor() && pr.legions === 1 && pr.adj_land.some(isEnemy);
});
const minGarrisonOf = id => prov(id).adj_land.some(isEnemy) ? 2 : 1;
/* §15.2: strettamente più triremi di ogni altro giocatore presente nel mare */
const hasSeaSuperiority = sid => {
  const t = sea(sid).triremes || {};
  const mine = t[myColor()] || 0;
  return mine > 0 && Object.entries(t).every(([c, n]) => c === myColor() || n < mine);
};
/* una mossa di riequilibrio possibile verso una provincia in deficit, o null */
function rebalanceMove() {
  for (const d of garrisonDeficits()) {
    const pd = prov(d);
    for (const q of Object.keys(lastState.map.provinces)) {
      if (q === d || !isMine(q)) continue;
      const pq = prov(q);
      if (pq.legions <= minGarrisonOf(q)) continue;
      if (pq.adj_land.includes(d) ||
          pq.adj_sea.some(s => pd.adj_sea.includes(s) && hasSeaSuperiority(s)))
        return { from: q, to: d };
    }
  }
  return null;
}
const myTriremes = sid => (sea(sid).triremes || {})[myColor()] || 0;

function ownerFill(owner) {
  if (owner === null) return "var(--free)";
  if (owner.startsWith("NEUTRAL_")) {
    return COLOR_HEX[owner.slice(8)] || "#777";
  }
  return COLOR_HEX[owner] || "#777";
}

function resetUiIfNeeded(st) {
  // le due fasi di rinforzo sono un'unica schermata: non azzerare la UI nel passaggio
  const phase = ["REINFORCE_LAND", "REINFORCE_NAVAL"].includes(st.turn.phase) ? "REINFORCE" : st.turn.phase;
  const key = `${st.turn.round}|${st.turn.turnIndex}|${phase}`;
  if (ui.key !== key) {
    ui = freshUi(key);
    // nuova fase del proprio turno: apre da sola il foglio azioni (su
    // telefono è chiuso di default) così non si perde nulla di richiesto;
    // resta comunque richiudibile per vedere la mappa
    if (st.turn.phase !== "LOBBY" && st.players[st.turn.turnIndex] && st.players[st.turn.turnIndex].id === myPlayerId) {
      openSheet("secActions");
    }
  }
}

/* province/mare cliccabili nella fase corrente (per l'evidenziazione) */
function computeClickables() {
  const st = lastState, ph = st.turn.phase;
  const provs = new Set(), seas = new Set();
  if (!isMyTurn()) return { provs, seas };
  const all = Object.keys(st.map.provinces);

  if (ph === "SETUP") {
    all.filter(isFree).forEach(id => provs.add(id));
  } else if (ph === "REINFORCE_LAND" || ph === "REINFORCE_NAVAL") {
    // schermata rinforzi unificata: la modalità decide cosa è toccabile
    if (ui.mode === "buy") {
      if (!ui.sel.prov) all.filter(id => isMine(id) && prov(id).legions >= 4 && prov(id).adj_sea.length).forEach(id => provs.add(id));
      else prov(ui.sel.prov).adj_sea.forEach(id => seas.add(id));
    } else if (ui.mode === "t2l") {
      if (!ui.sel.sea) Object.keys(st.map.seas).filter(id => myTriremes(id) > 0).forEach(id => seas.add(id));
      else sea(ui.sel.sea).adj_land.filter(isMine).forEach(id => provs.add(id));
    } else if (ui.mode === "trisSea") {
      Object.keys(st.map.seas).filter(sid => sea(sid).adj_land.some(pid => isMine(pid))).forEach(id => seas.add(id));
    } else if (ui.mode === "trisPc") {
      all.filter(id => isMine(id) && !prov(id).power_center
        && !prov(id).adj_land.some(n => prov(n).power_center)).forEach(id => provs.add(id));
    } else if (ph === "REINFORCE_LAND") {
      all.filter(isMine).forEach(id => provs.add(id));
    }
  } else if (ph === "NAVAL_MOVE") {
    if (!ui.sel.fromSea) Object.keys(st.map.seas).filter(id => myTriremes(id) > 0).forEach(id => seas.add(id));
    else sea(ui.sel.fromSea).adj_sea.forEach(id => seas.add(id));
  } else if (ph === "NAVAL_COMBAT") {
    Object.keys(st.map.seas).filter(id => {
      const t = sea(id).triremes || {};
      return myTriremes(id) > 0 && Object.entries(t).some(([c,n]) => c !== myColor() && n > 0);
    }).forEach(id => seas.add(id));
  } else if (ph === "SEA_ATTACKS") {
    // niente vicoli ciechi: si illumina solo cio' da cui si puo' davvero
    // salpare (§12.7 + guarnigione §14.3) verso cio' che si puo' davvero
    // colpire (§12.6). Prima si accendevano anche le province che il server
    // avrebbe poi rifiutato
    const conq = new Set(st.turn.seaConqueredProvinces || []);
    const colpite = new Set(st.turn.seaAttackedProvinces || []);
    const basi = id => isMine(id) && prov(id).adj_sea.length
      && !conq.has(id) && prov(id).legions - minGarrisonOf(id) >= 1;
    if (!ui.sel.from) all.filter(id => basi(id) && haBersagliVieMare(id)).forEach(id => provs.add(id));
    else {
      all.filter(id => isEnemy(id) && !colpite.has(id)
        && rotteBuone(ui.sel.from, id).length).forEach(id => provs.add(id));
      // puntato il bersaglio si accendono i mari da cui si puo' passare:
      // sono il prossimo tocco
      if (ui.sel.to) rotteBuone(ui.sel.from, ui.sel.to).forEach(sid => seas.add(sid));
    }
  } else if (ph === "LAND_ATTACKS") {
    if (!st.pending.occupation) {
      all.filter(id => isMine(id) && prov(id).legions > 1).forEach(id => provs.add(id));
      if (ui.sel.from) prov(ui.sel.from).adj_land.filter(isEnemy).forEach(id => provs.add(id));
    }
  } else if (ph === "STRATEGIC_MOVE") {
    // garrison-first: se il riequilibrio è obbligato, come destinazione evidenzia solo i deficit
    const mustFix = rebalanceMove() ? new Set(garrisonDeficits()) : null;
    if (!ui.sel.from) all.filter(id => isMine(id) && prov(id).legions > 1).forEach(id => provs.add(id));
    else {
      all.filter(id => isMine(id) && id !== ui.sel.from && (!mustFix || mustFix.has(id))).forEach(id => provs.add(id));
      provs.add(ui.sel.from); // ri-cliccabile per deselezionare
    }
  }
  return { provs, seas };
}

/* menu contestuale (pressione prolungata su una provincia/mare): scorciatoia
   per azioni che altrimenti richiederebbero prima di attivare una "modalità"
   dal foglio azioni (compra trireme, trireme -> legioni). Il tap normale
   mantiene il suo significato di sempre (es. piazza rinforzo). */
function tileMenuItemsFor(kind, id) {
  const st = lastState;
  if (!st || !isMyTurn()) return [];
  const ph = st.turn.phase;
  if (ph !== "REINFORCE_LAND" && ph !== "REINFORCE_NAVAL") return [];
  const items = [];
  if (kind === "prov") {
    if (isMine(id) && prov(id).legions >= 4 && prov(id).adj_sea.length) {
      items.push({ label: `🛒 Compra trireme da ${prov(id).name}`,
        run: () => { ui.mode = "buy"; ui.sel = { prov: id }; render(); } });
    }
  } else if (kind === "sea") {
    if (myTriremes(id) > 0) {
      items.push({ label: `⚓→🗡 Converti trireme (${sea(id).name})`,
        run: () => { ui.mode = "t2l"; ui.sel = { sea: id }; render(); } });
    }
  }
  return items;
}

function closeTileMenu() { $("tileMenu").classList.remove("on"); }

function openTileMenu(clientX, clientY, items) {
  const box = $("tileMenu");
  box.innerHTML = "";
  items.forEach(it => box.append(el("button", {
    onclick: () => { closeTileMenu(); it.run(); },
  }, it.label)));
  box.classList.add("on");
  // posiziona vicino al tocco, restando dentro lo schermo
  const w = box.offsetWidth || 200, h = box.offsetHeight || (items.length * 40 + 16);
  const x = Math.max(6, Math.min(window.innerWidth - w - 6, clientX - w / 2));
  const y = Math.max(6, Math.min(window.innerHeight - h - 6, clientY - h - 14));
  box.style.left = `${x}px`;
  box.style.top = `${y}px`;
}

/* ============ click sulla mappa ============ */
function onProvClick(id) {
  if (!lastState || !isMyTurn()) return;
  const ph = lastState.turn.phase;

  if (ph === "SETUP" && isFree(id)) {
    const needNeutral = lastState.setup.neutralPool.length > 0;
    if (!ui.sel.claim) ui.sel.claim = id;
    else if (needNeutral && !ui.sel.neutral && id !== ui.sel.claim) ui.sel.neutral = id;
    else ui.sel.claim = id, ui.sel.neutral = null;
  }
  else if (ph === "REINFORCE_LAND" || ph === "REINFORCE_NAVAL") {
    if (ui.mode === "buy" && isMine(id)) { ui.sel.prov = id; ui.sel.sea = null; }
    else if (ui.mode === "t2l" && ui.sel.sea && isMine(id) && sea(ui.sel.sea).adj_land.includes(id)) {
      sendCmd("trireme_to_legions", { seaId: ui.sel.sea, provinceId: id });
      ui.mode = null; ui.sel = {};
    }
    else if (ui.mode === "trisPc" && isMine(id) && !prov(id).power_center
        && !prov(id).adj_land.some(n => prov(n).power_center)) {
      ui.trisPc = id; ui.mode = null;
    }
    else if (ph === "REINFORCE_LAND" && !ui.mode && isMine(id)) {
      const remaining = lastState.pending.landReinforceRemaining - placedTotal();
      if (remaining > 0) ui.placements[id] = (ui.placements[id] || 0) + 1;
    }
  }
  else if (ph === "SEA_ATTACKS") {
    if (isMine(id)) {
      // le regole valgono anche al tocco, non solo nell'evidenziazione: da qui
      // il rifiuto arrivava dal server dopo aver gia' scelto forza e rotta
      if ((lastState.turn.seaConqueredProvinces || []).includes(id))
        return toast(`${prov(id).name} è stata conquistata via mare in questo turno: ` +
          "non può sferrare un altro attacco via mare (§12.7).");
      if (prov(id).legions - minGarrisonOf(id) < 1)
        return toast(`Da ${prov(id).name} non puoi imbarcare nessuno: deve restarci la guarnigione.`);
      ui.sel.from = id; ui.sel.to = null; ui.vals.saSea = null;
    }
    else if (isEnemy(id) && ui.sel.from) {
      if ((lastState.turn.seaAttackedProvinces || []).includes(id))
        return toast(`${prov(id).name} ha già subito un attacco via mare in questo turno (§12.6).`);
      const rotte = rotteBuone(ui.sel.from, id);
      if (!rotte.length) return toast(`Per sbarcare in ${prov(id).name} ti servono più triremi ` +
        "del difensore nel mare di passaggio (§12.2).");
      if (ui.sel.to !== id) {
        // nuovo bersaglio: la rotta di prima non vale piu'
        ui.sel.to = id;
        ui.vals.saSea = null;
        // una sola rotta possibile non e' una scelta: la si prende e basta
        if (rotte.length === 1) ui.vals.saSea = rotte[0];
      } else if (ui.vals.saSea) {
        // bersaglio gia' puntato con la rotta decisa: il secondo tocco imbarca,
        // come a terra. Con piu' rotte aperte tocca prima scegliere il mare
        openSbarco(ui.sel.from, id);
      }
    }
  }
  else if (ph === "LAND_ATTACKS" && !lastState.pending.occupation) {
    if (isMine(id)) { ui.sel.from = id; ui.sel.to = null; }
    else if (isEnemy(id) && ui.sel.from && prov(ui.sel.from).adj_land.includes(id)) {
      // primo tocco: miri, e compare la freccia. secondo tocco sullo stesso
      // bersaglio: attacchi, senza passare dal pannello
      if (ui.sel.to === id) {
        openDuel(ui.sel.from, id);   // l'arena dei dadi: si sceglie e si tira li'
      } else {
        ui.sel.to = id;
      }
    }
  }
  else if (ph === "STRATEGIC_MOVE" && isMine(id)) {
    if (id === ui.sel.from) { ui.sel.from = null; ui.sel.to = null; }   // ri-click: deseleziona
    else if (!ui.sel.from) { ui.sel.from = id; ui.sel.to = null; }
    else ui.sel.to = id;
  }
  render();
}

function onSeaClick(id) {
  if (!lastState || !isMyTurn()) return;
  const ph = lastState.turn.phase;

  if (ph === "REINFORCE_LAND" || ph === "REINFORCE_NAVAL") {
    if (ui.mode === "buy" && ui.sel.prov && prov(ui.sel.prov).adj_sea.includes(id)) {
      sendCmd("buy_trireme", { provinceId: ui.sel.prov, seaId: id });
      ui.mode = null; ui.sel = {};
    }
    else if (ui.mode === "t2l" && myTriremes(id) > 0) { ui.sel.sea = id; }
    else if (ui.mode === "trisSea" && sea(id).adj_land.some(pid => isMine(pid))) {
      ui.trisSeas.push(id);
      // esci dalla modalità quando tutte le triremi hanno un mare
      const nTri = ui.tris.map(i => (me().cards[i] || {}).symbol).filter(s => s === "TRIREME").length;
      if (ui.trisSeas.length >= nTri) ui.mode = null;
    }
  }
  else if (ph === "NAVAL_MOVE") {
    if (!ui.sel.fromSea && myTriremes(id) > 0) ui.sel.fromSea = id;
    else if (ui.sel.fromSea && id !== ui.sel.fromSea) ui.sel.toSea = id;
    else if (id === ui.sel.fromSea) { ui.sel.fromSea = null; ui.sel.toSea = null; }
  }
  else if (ph === "NAVAL_COMBAT") {
    ui.sel.sea = id; ui.sel.target = null;
  }
  else if (ph === "SEA_ATTACKS" && ui.sel.from && ui.sel.to) {
    // la rotta si sceglie sulla plancia, non in un menu a tendina: puntato il
    // bersaglio, i mari percorribili si accendono e quello che tocchi diventa
    // il ponte della traversata (§12.2)
    if (rotteBuone(ui.sel.from, ui.sel.to).includes(id)) {
      ui.vals.saSea = id;
      openSbarco(ui.sel.from, ui.sel.to);
    }
  }
  render();
}

/* ============ rendering ============ */
function render() {
  const st = lastState;
  if (!st) return;
  resetUiIfNeeded(st);
  if (!mapBuilt) { buildMap(st.map); fitVBDefault(); applyVB(); }

  // header
  $("phaseChip").innerHTML = `round <b>${st.turn.round}</b> · <b>${st.turn.phase}</b>`;
  const tp = turnPlayer();
  $("turnChip").innerHTML = st.turn.phase === "LOBBY" ? "in attesa di giocatori"
    : (tp ? (tp.id === myPlayerId ? "⭐ tocca a te" : `turno di <b>${tp.name}</b>`) : "—");

  // stesso contenuto, sovrapposto alla mappa: niente sguardi fuori dalla mappa
  renderMapHud(st, tp);

  renderMapState(st);
  renderScoreTrack(st);
  noteCombatFx(st);
  renderAttackArrow(st);
  renderPlayers(st);
  renderActions(st);
  renderCombat(st);
  renderCards(st);
  renderLog(st);
  maybeShowCombatPop(st);

  // l'arena si chiude da sola se la coppia non ha piu' senso: provincia
  // conquistata (parte l'occupazione), fase finita, o non e' piu' il tuo turno
  if (duel) {
    // mentre i dadi girano, o quando il tiro ha appena conquistato, l'arena
    // resta su: la conquista fa scattare pending.occupation e senza questa
    // eccezione il riquadro sparirebbe proprio sul colpo vincente
    const mostrando = duel.rolling || (duel.result && duel.result.conquered);
    const vivo = st.turn.phase === "LAND_ATTACKS" && isMyTurn() && (mostrando
      || (!st.pending.occupation && isMine(duel.from) && isEnemy(duel.to)));
    if (!vivo) closeDuel(); else renderDuel();
  }

  // l'arena dello sbarco: una volta salpati resta su fino all'esito, anche se
  // la provincia ha gia' cambiato colore. Chiude solo se la fase o il turno
  // cambiano sotto i piedi
  if (sbarco) {
    const inCorso = sbarco.fase !== "imbarco";
    const vivo = st.turn.phase === "SEA_ATTACKS" && isMyTurn()
      && (inCorso || (isMine(sbarco.from) && isEnemy(sbarco.to)));
    if (!vivo) closeSbarco(); else renderSbarco();
  }

  // vittoria
  if (st.winner) {
    $("bannerText").textContent = `🏆 ${st.winner} vince!`;
    $("banner").classList.add("on");
  } else {
    $("banner").classList.remove("on");
  }
}

function renderMapHud(st, tp) {
  const box = $("mapHud");
  box.innerHTML = "";
  box.append(el("span", { class:"chip" }, `round ${st.turn.round} · ${st.turn.phase}`));
  const mine = st.turn.phase !== "LOBBY" && tp && tp.id === myPlayerId;
  const line = el("div", { class:"turnLine" + (mine ? " mine" : "") });
  if (st.turn.phase !== "LOBBY" && tp && tp.color) {
    line.append(el("div", { class:"dot", style:`background:${COLOR_HEX[tp.color] || "#555"}` }));
  }
  line.append(el("span", { class:"chip" },
    st.turn.phase === "LOBBY" ? "in attesa di giocatori"
      : (tp ? (mine ? "⭐ tocca a te" : `turno di ${tp.name}`) : "—")));
  box.append(line);
}

/* Il gettone della provincia sotto sbarco, com'e' MENTRE lo scontro si gioca:
   il server ha gia' risolto tutto in un colpo, ma finche' i tiri si scoprono
   uno alla volta la mappa deve raccontare solo quello che si e' visto. Le
   legioni calano tiro dopo tiro, e il colore cambia solo alla fine.
   La provincia di partenza non serve congelarla: ha gia' perso gli imbarcati,
   ed e' giusto che si veda. */
function congelatoDaSbarco(id) {
  if (!sbarco || !sbarco.cur) return null;
  if (sbarco.fase !== "attesa" && sbarco.fase !== "battaglia") return null;
  if (id !== sbarco.to) return null;
  const vero = lastState.map.provinces[id];
  return { owner: sbarco.defOwner || vero.owner,
    legions: Math.max(0, sbarco.cur.d), power_center: vero.power_center };
}

function renderMapState(st) {
  const { provs: clkP, seas: clkS } = computeClickables();
  const defs = new Set(isMyTurn() && ["REINFORCE_LAND", "STRATEGIC_MOVE"].includes(st.turn.phase)
    ? garrisonDeficits().filter(id => !(ui.placements[id] > 0)) : []);
  for (const [id, pr0] of Object.entries(st.map.provinces)) {
    const g = $(`prov_${id}`);
    if (!g) continue;
    // finche' lo sbarco si sta ancora giocando tiro per tiro, i due gettoni
    // coinvolti restano com'erano: il server ha gia' risolto tutto, e senza
    // questo la mappa dietro l'arena mostrerebbe la conquista mentre stai
    // ancora tirando il primo colpo
    const pr = congelatoDaSbarco(id) || pr0;
    g.querySelector("circle.pip").setAttribute("fill", ownerFill(pr.owner));
    const extra = ui.placements[id] ? `+${ui.placements[id]}` : "";
    g.querySelector(".lg").textContent = pr.legions > 0 ? `${pr.legions}${extra}` : (extra || "");
    g.querySelector(".pcIcon").textContent = pr.power_center ? "🏛️" : "";
    g.querySelector(".pcHalo").classList.toggle("off", !pr.power_center);
    g.classList.toggle("neutralOwner", !!pr.owner && pr.owner.startsWith("NEUTRAL_"));
    g.classList.toggle("clickable", clkP.has(id));
    g.classList.toggle("atkTarget", clkP.has(id) && isEnemy(id));
    g.classList.toggle("deficit", defs.has(id));
    g.classList.toggle("selA", [ui.sel.claim, ui.sel.from, ui.sel.prov].includes(id));
    g.classList.toggle("selB", [ui.sel.neutral, ui.sel.to, ui.trisPc].includes(id));
  }
  // ogni mare mostra solo i colori presenti, nell'ordine dei giocatori, e il
  // rettangolo si stringe attorno a loro (cresce simmetrico attorno a SEA_XY)
  const seatColors = st.players.filter(p => p.color).map(p => p.color);
  for (const [id, s] of Object.entries(st.map.seas)) {
    const g = $(`sea_${id}`);
    if (!g) continue;
    const [cx, cy] = SEA_XY[id] || [0, 0];
    const t = s.triremes || {};
    const present = seatColors.filter(c => (t[c] || 0) > 0);
    // il mare vuoto tiene la misura di un posto: resta un'area di tocco sensata
    const { w: boxW, h: boxH } = seaBoxSize(Math.max(present.length, 1));
    const box = g.querySelector(".seaBox");
    box.setAttribute("x", cx - boxW / 2); box.setAttribute("y", cy - boxH / 2);
    box.setAttribute("width", boxW); box.setAttribute("height", boxH);

    const slots = g.querySelector(".slots");
    slots.innerHTML = "";
    const rowW = present.length * SEA_SQ + Math.max(present.length - 1, 0) * SEA_GAP;
    present.forEach((c, i) => {
      const x = cx - rowW / 2 + i * (SEA_SQ + SEA_GAP);
      slots.append(svgEl("rect", {
        class:"slot", x, y: cy - SEA_SQ / 2, width: SEA_SQ, height: SEA_SQ, rx:3,
        fill: COLOR_HEX[c] || "#7d8590",
      }));
      const n = svgEl("text", {
        class:"slotN", x: x + SEA_SQ / 2, y: cy,
        "text-anchor":"middle", "dominant-baseline":"central",
      });
      n.textContent = t[c];
      slots.append(n);
    });
    g.classList.toggle("empty", present.length === 0);
    g.classList.toggle("clickable", clkS.has(id));
    // in NAVAL_COMBAT ogni mare cliccabile è di per sé un bersaglio di combattimento
    g.classList.toggle("atkTarget", clkS.has(id) && st.turn.phase === "NAVAL_COMBAT");
    g.classList.toggle("selA", [ui.sel.sea, ui.sel.fromSea].includes(id));
    g.classList.toggle("selB", ui.sel.toSea === id || ui.trisSeas.includes(id));
  }
}

/* §5.6 lato client: chi si aggiudicherebbe ora ciascun criterio punti vittoria */
function empireSize(st, color) {
  const provs = st.map.provinces;
  const owned = new Set(Object.keys(provs).filter(id => provs[id].owner === color));
  let best = 0;
  const seen = new Set();
  for (const start of owned) {
    if (seen.has(start)) continue;
    let size = 0;
    const stack = [start]; seen.add(start);
    while (stack.length) {
      const cur = stack.pop(); size++;
      for (const nb of provs[cur].adj_land) if (owned.has(nb) && !seen.has(nb)) { seen.add(nb); stack.push(nb); }
    }
    best = Math.max(best, size);
  }
  return best;
}
function currentAwards(st) {
  // per colore: {empire, provs, seas, pcs} + vincitori (solo se strettamente primi)
  const colors = st.players.filter(p => !p.eliminated && p.color).map(p => p.color);
  const stats = {};
  for (const c of colors) {
    stats[c] = {
      empire: empireSize(st, c),
      provs: Object.values(st.map.provinces).filter(pr => pr.owner === c).length,
      seas: Object.values(st.map.seas).filter(s => {
        const t = s.triremes || {}; const mine = t[c] || 0;
        return mine > 0 && Object.entries(t).every(([k, n]) => k === c || n < mine);
      }).length,
      pcs: Object.values(st.map.provinces).filter(pr => pr.owner === c && pr.power_center).length,
    };
  }
  const strictBest = key => {
    let win = null;
    for (const c of colors) {
      const v = stats[c][key];
      if (win === null || v > stats[win][key]) win = c;
    }
    if (win === null) return null;
    const tied = colors.some(c => c !== win && stats[c][key] === stats[win][key]);
    return tied ? null : win;
  };
  const empireWin = strictBest("empire");
  return {
    stats,
    empire: empireWin && stats[empireWin].empire >= 4 ? empireWin : null,
    provs: strictBest("provs"),
    seas: (() => { const w = strictBest("seas"); return w && stats[w].seas > 0 ? w : null; })(),
  };
}

function renderPlayers(st) {
  const box = $("playersBox");
  box.innerHTML = "";
  const aw = st.turn.phase !== "LOBBY" ? currentAwards(st) : null;
  st.players.forEach((p, i) => {
    const row = el("div", { class: "pRow" + (i === st.turn.turnIndex && st.turn.phase !== "LOBBY" ? " turn" : "") });
    row.append(el("div", { class:"dot", style:`background:${p.color ? COLOR_HEX[p.color] : "#555"}` }));
    const nm = el("span", { class:"nm" }, p.name + (p.id === myPlayerId ? " (tu)" : ""));
    row.append(nm);
    const bits = [];
    if (st.turn.phase === "LOBBY") bits.push(p.ready ? "✅ pronto" : "⬜");
    else {
      bits.push(`⭐${p.score}`);
      bits.push(`🏰${aw.stats[p.color] ? aw.stats[p.color].provs : 0}`);
      bits.push(`🃏${p.cardCount !== undefined ? p.cardCount : (p.cards||[]).length}`);
      if (p.eliminated) bits.push("💀");
    }
    if (p.connected === false) bits.push("📴");
    row.append(el("span", { class:"inf" }, bits.join(" ")));
    box.append(row);
    // chi si aggiudica ora i punti vittoria (§5.6): badge sotto il nome
    if (aw && p.color && !p.eliminated) {
      const s = aw.stats[p.color];
      const badges = [];
      if (aw.empire === p.color) badges.push(`🏆 impero (${s.empire})`);
      if (aw.provs === p.color) badges.push(`🏆 province (${s.provs})`);
      if (aw.seas === p.color) badges.push(`🏆 mari (${s.seas})`);
      if (s.pcs > 0) badges.push(`★ centri: ${s.pcs}`);
      if (badges.length) box.append(el("div", { class:"vpBadges" }, `+${badges.length + (s.pcs > 0 ? s.pcs - 1 : 0)} VP a inizio turno · ` + badges.join(" · ")));
    }
  });
  // i neutrali compaiono come riga finché possiedono province
  if (st.turn.phase !== "LOBBY") {
    const neutralProvs = Object.values(st.map.provinces).filter(pr => pr.owner && pr.owner.startsWith("NEUTRAL_"));
    if (neutralProvs.length > 0) {
      const row = el("div", { class:"pRow" });
      row.append(el("div", { class:"dot", style:`background:${ownerFill(neutralProvs[0].owner)}` }));
      row.append(el("span", { class:"nm", style:"color:var(--muted)" }, "Neutrali"));
      row.append(el("span", { class:"inf" }, `🏰${neutralProvs.length}`));
      box.append(row);
    }
  }
  if (st.turn.phase !== "LOBBY")
    box.append(el("div", { class:"inf", style:"font-size:11px;color:var(--muted);margin-top:6px" },
      `Obiettivo: ${st.settings.targetScore} punti`));
}

function actionBtn(label, fn, cls) {
  return el("button", { class: cls || "", onclick: fn }, label);
}

function numInput(key, def, min, max) {
  const v = ui.vals[key] !== undefined ? ui.vals[key] : def;
  const inp = el("input", { type:"number", min, max, value:v, style:"width:70px",
    oninput: e => { ui.vals[key] = e.target.value; } });
  return inp;
}
const valNum = (key, def) => {
  const n = parseInt(ui.vals[key], 10);
  return isNaN(n) ? def : n;
};

/* slider touch-friendly con etichetta valore/max */
function sliderRow(labelTxt, key, def, min, max) {
  const cur = Math.max(min, Math.min(max, valNum(key, def)));
  ui.vals[key] = cur;
  const lbl = el("span", { class:"sv" }, `${cur} / ${max}`);
  const rng = el("input", { type:"range", min, max, value:cur,
    oninput: e => { ui.vals[key] = parseInt(e.target.value, 10); lbl.textContent = `${e.target.value} / ${max}`; } });
  return el("div", { class:"sliderRow" }, el("label", {}, labelTxt), rng, lbl);
}

/* scelta dadi come bottoni grandi. minD serve agli attacchi terrestri: sotto
   il numero di dadi del difensore il server rifiuta il tiro (§10.5), quindi
   quei bottoni vanno spenti invece di far rimbalzare il comando */
function diceBtns(key, maxD, minD = 1) {
  const cur = Math.max(minD, Math.min(maxD, valNum(key, maxD)));
  ui.vals[key] = cur;
  const wrap = el("div", { class:"segBtns" });
  for (let d = 1; d <= maxD; d++) {
    const b = el("button", { class: d === cur ? "on" : "",
      onclick: () => { ui.vals[key] = d; render(); } }, `${d} 🎲`);
    if (d < minD) {
      b.disabled = true;
      b.title = `Il difensore tira ${minD} dadi: non puoi usarne di meno (§10.5)`;
    }
    wrap.append(b);
  }
  return wrap;
}

function renderActions(st) {
  const box = $("actions");
  box.innerHTML = "";
  const ph = st.turn.phase;
  if (isSpectator) {
    box.append(el("div", { class:"hint" }, "👁 Stai guardando la partita: nessuna azione disponibile."));
    return;
  }
  const add = (...nodes) => nodes.forEach(n => box.append(n));
  const hint = t => el("div", { class:"hint" }, t);
  const selInfo = t => el("div", { class:"selInfo" }, t);
  const row = (...kids) => { const r = el("div", { class:"row" }); kids.forEach(k => r.append(k)); return r; };

  if (ph === "LOBBY") {
    const m = me();
    add(hint(`Condividi il codice stanza. Servono 3-5 giocatori (siete in ${st.players.length}).`));
    add(row(actionBtn(m && m.ready ? "Pronto ✅" : "Sono pronto", () => sendCmd("ready"))));
    const tsRow = row(el("label", {}, "Punti vittoria:"), numInput("targetScore", st.settings.targetScore, 5, 999));
    add(tsRow);
    const canStart = st.players.length >= 3 && st.players.every(p => p.ready);
    const b = actionBtn("Avvia partita", () => sendCmd("start_game", { targetScore: valNum("targetScore", st.settings.targetScore) }), "primary");
    b.disabled = !canStart;
    add(row(b));
    return;
  }

  if (!isMyTurn()) {
    add(hint(`È il turno di ${turnPlayer().name}. Attendi…`));
    return;
  }

  if (ph === "SETUP") {
    const needNeutral = st.setup.neutralPool.length > 0;
    add(hint(needNeutral
      ? "Scegli una provincia libera per te (oro) e una per i neutrali (azzurro)."
      : "Scegli una provincia libera per te."));
    if (ui.sel.claim) add(selInfo(`Tua: ${prov(ui.sel.claim).name}`));
    if (ui.sel.neutral) add(selInfo(`Neutrale: ${prov(ui.sel.neutral).name}`));
    const ok = ui.sel.claim && (!needNeutral || ui.sel.neutral);
    const b = actionBtn("Conferma", () => {
      const payload = { provinceId: ui.sel.claim };
      if (ui.sel.neutral) payload.neutralProvinceId = ui.sel.neutral;
      sendCmd("setup_claim", payload);
      ui.sel = {};
    }, "primary");
    b.disabled = !ok;
    add(row(b, actionBtn("Annulla", () => { ui.sel = {}; render(); })));
    return;
  }

  if (ph === "SCORE") {
    add(hint("Inizio del tuo turno: calcola il punteggio e ricevi i rinforzi."));
    add(row(actionBtn("Inizia rinforzi", () => sendCmd("reinforce_land_begin"), "primary")));
    return;
  }

  if (ph === "REINFORCE_LAND" || ph === "REINFORCE_NAVAL") {
    // schermata rinforzi unificata: legioni, tris, triremi e centri in un posto solo
    const m = me();
    const inLand = ph === "REINFORCE_LAND";
    const remaining = inLand ? st.pending.landReinforceRemaining - placedTotal() : 0;
    const myTriTot = Object.keys(st.map.seas).reduce((a, sid) => a + myTriremes(sid), 0);
    const myPc = Object.values(st.map.provinces).filter(pr => pr.owner === myColor() && pr.power_center).length;

    // contatori per tipo
    add(el("div", { class:"counters" },
      el("span", { class:"chip" }, `🗡 da piazzare: ${remaining}`),
      el("span", { class:"chip" }, `⛵ triremi: ${myTriTot}`),
      el("span", { class:"chip" }, `★ centri: ${myPc}`)));

    // suggerimento in base alla modalità attiva
    if (ui.mode === "buy") add(hint(ui.sel.prov
      ? `Provincia: ${prov(ui.sel.prov).name} → tocca un mare adiacente.`
      : "Compra trireme: tocca una tua provincia costiera con almeno 4 legioni."));
    else if (ui.mode === "t2l") add(hint(ui.sel.sea
      ? `Mare: ${sea(ui.sel.sea).name} → tocca la tua provincia di sbarco.`
      : "Trireme → legioni: tocca un mare con una tua trireme."));
    else if (ui.mode === "trisSea") add(hint("Tocca i mari dove piazzare le triremi del tris."));
    else if (ui.mode === "trisPc") add(hint("Tocca la provincia dove costruire il centro di potere."));
    else if (inLand) add(hint("Tocca le tue province per piazzare le legioni (+1 a tocco)."));
    else add(hint("Puoi ancora comprare triremi o convertirle, poi chiudi i rinforzi."));

    if (inLand) {
      // regola casa "garrison-first": prima le guarnigioni di frontiera a 1
      const defs = garrisonDeficits();
      const uncovered = defs.filter(id => !(ui.placements[id] > 0));
      const enough = st.pending.landReinforceRemaining >= defs.length;
      const violates = enough
        ? uncovered.length > 0
        : Object.entries(ui.placements).some(([id, n]) => !defs.includes(id) || n > 1);
      if (defs.length && violates) {
        add(hint(enough
          ? `⚠️ Prima riporta a 2 le guarnigioni di frontiera: ${uncovered.map(id => prov(id).name).join(", ")}`
          : `⚠️ Rinforzi insufficienti per tutte le guarnigioni: piazzane 1 ciascuno solo sulle province tratteggiate in rosso`));
      }

      for (const [id, n] of Object.entries(ui.placements)) {
        if (!n) continue;
        const r = row(el("span", { style:"flex:1;font-size:13px;align-self:center" }, `${prov(id).name}: +${n}`),
          actionBtn("−", () => { ui.placements[id]--; if (!ui.placements[id]) delete ui.placements[id]; render(); }));
        add(r);
      }
      const b = actionBtn(`Conferma piazzamento (+${placedTotal()})`, () => {
        sendCmd("reinforce_land_place", { placements: { ...ui.placements } });
        ui.placements = {};
      }, "primary");
      b.disabled = remaining !== 0 || placedTotal() === 0 || violates;
      add(row(b));

      // tris: carte sotto, mari e centro si scelgono toccando la mappa
      if (!st.turn.trisPlayed && m.cards.length >= 3) {
        add(el("div", { style:"border-top:1px solid var(--line);margin:8px 0 4px" }));
        if (ui.tris.length < 3) {
          add(hint("Tris: tocca 3 carte qui sotto (3 uguali = 8, 3 diverse = 10 legioni)."));
        } else {
          const syms = ui.tris.map(i => m.cards[i].symbol);
          const nTri = syms.filter(s => s === "TRIREME").length;
          const hasArena = syms.includes("ARENA");
          if (nTri > 0) {
            add(row(actionBtn(ui.mode === "trisSea"
              ? `⛵ Tocca i mari… (${ui.trisSeas.length}/${nTri})`
              : `⛵ Mari per le triremi (${ui.trisSeas.length}/${nTri})`,
              () => { ui.mode = ui.mode === "trisSea" ? null : "trisSea"; ui.sel = {}; render(); })));
            if (ui.trisSeas.length) {
              const chips = el("div", {});
              ui.trisSeas.forEach((sid, k) => {
                chips.append(el("span", { class:"seaChip",
                  onclick: () => { ui.trisSeas.splice(k, 1); render(); } }, `⛵ ${sea(sid).name} ✕`));
              });
              add(chips);
            }
          }
          if (hasArena) {
            add(row(actionBtn(ui.mode === "trisPc"
              ? "★ Tocca la provincia…"
              : (ui.trisPc ? `★ Centro: ${prov(ui.trisPc).name} ✕` : "★ Centro di potere (facoltativo)"),
              () => {
                if (ui.trisPc) { ui.trisPc = null; ui.mode = null; }
                else ui.mode = ui.mode === "trisPc" ? null : "trisPc";
                render();
              })));
          }
          add(row(actionBtn("Gioca tris", () => {
            if (ui.tris.length !== 3) return; // doppio click: il primo invio ha già azzerato la selezione
            const payload = { cards: [...ui.tris] };
            if (ui.trisSeas.length) payload.triremeSeas = [...ui.trisSeas];
            if (hasArena && ui.trisPc) payload.powerCenterProvince = ui.trisPc;
            sendCmd("play_tris", payload);
            ui.tris = []; ui.trisSeas = []; ui.trisPc = null; ui.mode = null;
          }, "primary")));
        }
      }
      add(el("div", { style:"border-top:1px solid var(--line);margin:8px 0 4px" }));
    }

    // triremi: disponibili in entrambe le fasi di rinforzo
    add(row(
      actionBtn(ui.mode === "buy" ? "🛒 Compra… (attivo)" : "Compra trireme (3🗡)", () => { ui.mode = ui.mode === "buy" ? null : "buy"; ui.sel = {}; render(); }),
      actionBtn(ui.mode === "t2l" ? "⚓→🗡 (attivo)" : "Trireme → 2 legioni", () => { ui.mode = ui.mode === "t2l" ? null : "t2l"; ui.sel = {}; render(); }),
    ));

    if (!inLand) add(row(actionBtn("Fine rinforzi", () => sendCmd("end_phase"), "primary")));
    return;
  }

  if (ph === "NAVAL_MOVE") {
    add(hint("Sposta triremi tra mari adiacenti (un solo movimento)."));
    if (ui.sel.fromSea) add(selInfo(`Da: ${sea(ui.sel.fromSea).name}${ui.sel.toSea ? " → " + sea(ui.sel.toSea).name : ""}`));
    if (ui.sel.fromSea && ui.sel.toSea) {
      const max = myTriremes(ui.sel.fromSea);
      add(sliderRow("Triremi:", "nmCount", max, 1, max));
      add(row(actionBtn("Sposta", () => {
        sendCmd("naval_move", { fromSea: ui.sel.fromSea, toSea: ui.sel.toSea, count: valNum("nmCount", max) });
        ui.sel = {};
      }, "primary")));
    }
    add(row(actionBtn("Salta movimento", () => sendCmd("end_phase"))));
    return;
  }

  if (ph === "NAVAL_COMBAT") {
    add(hint("Combattimento navale: clicca un mare dove hai triremi insieme a un avversario."));
    if (ui.sel.sea) {
      const t = sea(ui.sel.sea).triremes || {};
      const targets = Object.entries(t).filter(([c,n]) => c !== myColor() && n > 0);
      add(selInfo(`Mare: ${sea(ui.sel.sea).name}`));
      const r = row();
      targets.forEach(([c,n]) => {
        const b = actionBtn(`${c} (${n}⛵)`, () => { ui.sel.target = c; render(); });
        if (ui.sel.target === c) b.classList.add("primary");
        r.append(b);
      });
      add(r);
      if (ui.sel.target) {
        const maxD = Math.min(3, myTriremes(ui.sel.sea));
        add(row(el("label", { style:"align-self:center" }, "Dadi:"), diceBtns("ncDice", maxD)));
        add(row(actionBtn("Attacca", () => {
          sendCmd("naval_attack_roll", { seaId: ui.sel.sea, targetColor: ui.sel.target, attackDice: valNum("ncDice", maxD) });
        }, "primary")));
      }
    }
    add(row(actionBtn("Fine combattimenti navali", () => sendCmd("end_phase"))));
    return;
  }

  if (ph === "SEA_ATTACKS") {
    const rotte = ui.sel.from && ui.sel.to ? rotteBuone(ui.sel.from, ui.sel.to) : [];
    const rotta = rotte.includes(ui.vals.saSea) ? ui.vals.saSea : null;
    add(hint(!ui.sel.from ? "Attacco via mare: tocca la tua provincia costiera di partenza."
      : !ui.sel.to ? "Ora tocca la provincia nemica da attaccare, oltre un mare in cui hai più triremi."
      : !rotta ? "Scegli la rotta: tocca sulla mappa uno dei mari illuminati."
      : "Tocca di nuovo il bersaglio (o il mare) per imbarcare."));
    if (ui.sel.from) add(selInfo(`Da: ${prov(ui.sel.from).name}` +
      (ui.sel.to ? ` ⛵ ${prov(ui.sel.to).name}` : "") +
      (rotta ? ` · via ${sea(rotta).name}` : "")));
    // la scelta della forza si fa nell'arena, come a terra: qui resta solo la
    // scorciatoia per aprirla, e solo quando la rotta e' decisa
    if (rotta) add(row(actionBtn("Imbarca ⛵", () => openSbarco(ui.sel.from, ui.sel.to), "primary")));
    add(row(actionBtn("Fine attacchi via mare", () => sendCmd("end_phase"))));
    return;
  }

  if (ph === "LAND_ATTACKS") {
    const occ = st.pending.occupation;
    if (occ) {
      const from = prov(occ.from);
      // §14.2: nella provincia di partenza deve restare la guarnigione minima
      const maxN = from.legions - minGarrisonOf(occ.from);
      add(hint(`Conquista di ${prov(occ.to).name}! Puoi spostare altre legioni da ${from.name}.`));
      if (maxN > 0) {
        add(sliderRow("Legioni extra:", "occN", maxN, 1, maxN));
        add(row(actionBtn("Sposta", () => sendCmd("occupy_extra", { count: valNum("occN", maxN) }), "primary")));
      }
      add(row(actionBtn("Fine attacchi", () => { ui.sel = {}; sendCmd("end_attacks"); })));
      add(hint("…oppure tocca la mappa per un altro attacco (chiude l'occupazione)."));
    }
    if (!occ) {
      add(hint("Attacchi terrestri: tocca una tua provincia (con 2+ legioni), poi una nemica adiacente."));
      if (ui.sel.from) add(selInfo(`Da: ${prov(ui.sel.from).name}${ui.sel.to ? " → " + prov(ui.sel.to).name : ""}`));
      if (ui.sel.from && ui.sel.to) {
        const rg = attackDiceRange(ui.sel.from, ui.sel.to);
        if (!rg.ok) {
          add(hint(`Attacco impossibile: ${prov(ui.sel.to).name} difende con ${rg.min} dadi e ` +
            `da ${prov(ui.sel.from).name} puoi tirarne al massimo ${rg.max} (§10.5).`));
        } else {
          // anche da qui si passa dall'arena dei dadi: il tiro si guarda
          // sempre nello stesso posto, da qualunque parte lo si lanci
          add(row(actionBtn("Attacca ⚔️", () => openDuel(ui.sel.from, ui.sel.to), "primary")));
        }
      }
      add(row(actionBtn("Fine attacchi", () => sendCmd("end_attacks"))));
    }
    return;
  }

  if (ph === "STRATEGIC_MOVE") {
    add(hint("Spostamento strategico (facoltativo, uno solo): tra tue province collegate via terra o via mare controllato."));
    // regola casa "garrison-first": se una frontiera a 1 è sanabile, il riequilibrio è obbligato
    const defs = garrisonDeficits();
    const rb = defs.length ? rebalanceMove() : null;
    if (rb) {
      add(hint(`⚠️ Riequilibrio obbligatorio: porta a 2 una guarnigione di frontiera ` +
        `(${defs.map(id => prov(id).name).join(", ")}), es. da ${prov(rb.from).name} a ${prov(rb.to).name}.`));
    }
    if (ui.sel.from) add(selInfo(`Da: ${prov(ui.sel.from).name}${ui.sel.to ? " → " + prov(ui.sel.to).name : ""}`),
      row(actionBtn("Annulla selezione", () => { ui.sel = {}; render(); })));
    if (ui.sel.from && ui.sel.to) {
      // §14.2: nella provincia di partenza deve restare la guarnigione minima
      const maxN = prov(ui.sel.from).legions - minGarrisonOf(ui.sel.from);
      const badTarget = rb && !defs.includes(ui.sel.to);
      if (badTarget) add(hint("Questa destinazione non sana nessuna guarnigione di frontiera."));
      const bMove = actionBtn("Sposta e chiudi turno", () => {
        sendCmd("strategic_move", { from: ui.sel.from, to: ui.sel.to, count: valNum("smN", maxN) });
        ui.sel = {};
      }, "primary");
      bMove.disabled = badTarget || maxN < 1;
      if (maxN >= 1) add(sliderRow("Legioni:", "smN", maxN, 1, maxN));
      else add(hint(`Da ${prov(ui.sel.from).name} non può partire nessuna legione (guarnigione minima §14.2).`));
      add(row(bMove));
    }
    const bEnd = actionBtn("Fine turno (nessuno spostamento)", () => sendCmd("end_turn"));
    bEnd.disabled = !!rb;
    if (rb) bEnd.title = "Devi prima riequilibrare una guarnigione di frontiera a 1 legione";
    add(row(bEnd));
    return;
  }

  add(hint(`Fase: ${ph}`));
}

const DIE_FACE = ["⚀","⚁","⚂","⚃","⚄","⚅"];

/* su telefono la sezione combattimento è nascosta: l'esito appare come popup */
let shownCombatT = null;
function maybeShowCombatPop(st) {
  const lc = st.lastCombat;
  if (shownCombatT === null) { shownCombatT = lc ? lc.t : 0; return; } // niente popup al primo stato
  if (!lc || lc.t === shownCombatT) return;
  shownCombatT = lc.t;
  if (duel || sbarco) return;   // l'arena mostra gia' il tiro: niente doppio popup
  if (!window.matchMedia("(max-width: 820px)").matches) return;
  const pop = $("combatPop");
  pop.innerHTML = $("combatBox").innerHTML;
  pop.classList.add("on");
  clearTimeout(maybeShowCombatPop._t);
  maybeShowCombatPop._t = setTimeout(() => pop.classList.remove("on"), 6000);
}

function renderCombat(st) {
  const box = $("combatBox");
  box.innerHTML = "";
  const lc = st.lastCombat;
  if (!lc) {
    box.append(el("span", { style:"font-size:13px;color:var(--muted)" }, "Nessun combattimento."));
    return;
  }
  const atkCol = COLOR_HEX[lc.attacker] || "#ccc";
  const defCol = ownerFill(lc.defender);
  let where = "";
  if (lc.kind === "land") where = `${prov(lc.from).name} → ${prov(lc.to).name}`;
  if (lc.kind === "naval") where = `⛵ ${sea(lc.sea).name}`;
  if (lc.kind === "sea") where = `${prov(lc.from).name} → ${prov(lc.to).name} via ${sea(lc.sea).name}`;

  const head = el("div", { class:"combatHead" });
  head.append(el("span", { style:`color:${atkCol};font-weight:700` }, lc.attacker), " vs ",
    el("span", { style:`color:${defCol};font-weight:700` }, String(lc.defender || "?")),
    ` · ${where} `);
  if (lc.conquered) head.append(el("span", { class:"win" }, " CONQUISTA! 🏛️"));
  box.append(head);

  const rolls = el("div", { id:"combatRolls" });
  lc.rolls.forEach(r => {
    const row = el("div", { class:"combatRow" });
    r.att.forEach(v => row.append(el("span", { class:"die", style:`color:${atkCol}` }, DIE_FACE[v-1] || "?")));
    row.append(el("span", { class:"vs" }, "vs"));
    r.def.forEach(v => row.append(el("span", { class:"die", style:`color:${defCol}` }, DIE_FACE[v-1] || "?")));
    row.append(el("span", { class:"vs" }, `perdite A−${r.attLoss} D−${r.defLoss}`));
    rolls.append(row);
  });
  box.append(rolls);
  rolls.scrollTop = rolls.scrollHeight;
}

function renderCards(st) {
  const box = $("cardsBox");
  box.innerHTML = "";
  const m = me();
  if (!m || !m.cards || m.cards.length === 0) {
    box.append(el("span", { style:"font-size:13px;color:var(--muted)" }, "Nessuna carta."));
    return;
  }
  const selectable = st.turn.phase === "REINFORCE_LAND" && isMyTurn() && !st.turn.trisPlayed;
  m.cards.forEach((c, i) => {
    const chip = el("span", { class: "cardChip" + (ui.tris.includes(i) ? " sel" : "") },
      `${CARD_ICON[c.symbol] || "❓"} ${c.symbol.toLowerCase()}`);
    if (selectable) chip.onclick = () => {
      const at = ui.tris.indexOf(i);
      if (at >= 0) ui.tris.splice(at, 1);
      else if (ui.tris.length < 3) ui.tris.push(i);
      // cambiando le carte, mari e centro scelti non valgono più
      ui.trisSeas = []; ui.trisPc = null;
      if (ui.mode === "trisSea" || ui.mode === "trisPc") ui.mode = null;
      render();
      // selezionate le 3 carte: passa da solo al foglio Azioni, dove
      // compaiono i bonus tris (triremi/centro di potere) e "Gioca tris" -
      // altrimenti restano nascosti dietro al pannello carte
      if (ui.tris.length === 3) openSheet("secActions");
    };
    box.append(chip);
  });
}

function renderLog(st) {
  const box = $("logBox");
  const myName = (me() || {}).name;
  box.innerHTML = "";
  (st.log || []).slice(-20).forEach(e => {
    const d = el("div", { class: myName && e.text.includes(myName) ? "me" : "" }, e.text);
    box.append(d);
  });
  box.scrollTop = box.scrollHeight;
}

/* ============ bootstrap ============ */
$("btnCreate").onclick = () => {
  $("room").value = genRoom();
  $("joinMsg").textContent = "Codice generato: condividilo con gli altri giocatori.";
};
$("btnConnect").onclick = () => connect(false);
$("btnSpectate").onclick = () => {
  if (!$("room").value.trim()) return toast("Serve il codice della stanza");
  connect(true);
};
$("btnReset").onclick = () => {
  if (confirm("Riportare la partita alla lobby per tutti?")) sendCmd("reset_game");
};
$("bannerReset").onclick = () => sendCmd("reset_game");
$("btnDebug").onclick = () => { location.href = "/debug.html"; };
$("room").addEventListener("input", e => { e.target.value = e.target.value.toUpperCase(); });
initMapGestures();

/* pannelli a comparsa (telefono): si escludono a vicenda */
function openSheet(id) {
  for (const s of ["secCards", "secPlayers", "secActions"]) {
    $(s).classList.toggle("open", s === id);
  }
  const actionsOpen = $("secActions").classList.contains("open");
  $("actionsTab").textContent = actionsOpen ? "⚔️ Azioni ▴" : "⚔️ Azioni ▾";
  $("actionsTab").classList.toggle("raised", actionsOpen);
}
function toggleSheet(id) {
  openSheet($(id).classList.contains("open") ? null : id);
}
$("fabCards").onclick = () => toggleSheet("secCards");
$("fabPlayers").onclick = () => toggleSheet("secPlayers");
$("actionsTab").onclick = () => toggleSheet("secActions");
$("combatPop").onclick = () => $("combatPop").classList.remove("on");
// tocco altrove chiude il menu contestuale senza eseguire nulla
document.addEventListener("pointerdown", e => {
  if (!e.target.closest("#tileMenu")) closeTileMenu();
});

/* schermo intero: su iOS (Safari, Chrome, ecc. — tutti girano su WebKit)
   il Fullscreen API esiste ma non nasconde mai la barra indirizzi/schede
   del browser per una pagina normale: è un limite del sistema, non della
   pagina. L'unico modo per eliminarle davvero è "Aggiungi a Home" (usa il
   manifest con display:fullscreen già configurato), quindi su iOS in tab
   normale il bottone sparisce e mostriamo l'invito ad installarla. */
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const standalone = window.navigator.standalone === true
  || window.matchMedia("(display-mode: standalone)").matches
  || window.matchMedia("(display-mode: fullscreen)").matches;

if (isIOS) {
  // installata da Home: il manifest la apre già a schermo intero, nulla da fare.
  // in tab normale: il fullscreen "vero" non è ottenibile via JS, si nasconde il bottone.
  $("fabFs").style.display = "none";
  if (!standalone && !localStorage.getItem("spq_a2hs_hint_dismissed")) {
    $("a2hsHint").classList.add("on");
    $("a2hsHintClose").onclick = () => {
      $("a2hsHint").classList.remove("on");
      localStorage.setItem("spq_a2hs_hint_dismissed", "1");
    };
  }
} else if (!document.documentElement.requestFullscreen) {
  $("fabFs").style.display = "none";
} else {
  $("fabFs").onclick = async () => {
    if (document.fullscreenElement) { document.exitFullscreen(); return; }
    await document.documentElement.requestFullscreen();
    // la mappa è orizzontale: su telefono ruota in landscape (solo Android)
    try { await screen.orientation.lock("landscape"); } catch {}
  };
  document.addEventListener("fullscreenchange", () => {
    $("fabFs").textContent = document.fullscreenElement ? "🗗" : "⛶";
    if (!document.fullscreenElement) { try { screen.orientation.unlock(); } catch {} }
  });
}

(() => {
  const s = loadSession();
  if (s) {
    $("name").value = s.name || "";
    $("room").value = s.room || "";
    $("joinMsg").textContent = `Sessione salvata per la stanza ${s.room}: premi Connetti per rientrare.`;
  }
})();
</script>
